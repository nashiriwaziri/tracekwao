/* ===== REPORTS ===== */
function renderReports(){document.getElementById('sec-reports').innerHTML=`<div class="mb-6"><h1 class="text-2xl font-display font-800">${t('reports')}</h1></div><div class="stat-card mb-6" style="max-width:500px"><div class="grid grid-cols-2 gap-4 mb-4"><div><label class="form-label">${t('fromDate')}</label><input type="date" class="form-input" id="rp-from" value="${monthAgo()}"></div><div><label class="form-label">${t('toDate')}</label><input type="date" class="form-input" id="rp-to" value="${today()}"></div></div><div class="mb-4"><label class="form-label">${t('reportType')}</label><select class="form-select" id="rp-type"><option value="profit">${t('profitReport')}</option><option value="inventory">${t('inventoryReport')}</option></select></div><button class="btn btn-primary" onclick="genReport()"><i class="fas fa-file-alt"></i> ${t('generate')}</button></div><div id="rp-result"></div>`}
function genReport(){const from=document.getElementById('rp-from').value,to=document.getElementById('rp-to').value,type=document.getElementById('rp-type').value;const el=document.getElementById('rp-result');
if(type==='profit'){const sales=getData('sales',[]).filter(s=>s.date>=from&&s.date<=to);const total=sales.reduce((a,s)=>a+s.total,0);const cost=sales.reduce((a,s)=>a+s.cost,0);
el.innerHTML=`<div class="stat-card"><h3 class="font-display font-700 mb-3">${t('profitReport')}</h3><div class="grid grid-cols-3 gap-4 mb-4">${statCard(t('total'),fmt(total),'TZS','fa-money-bill','bg-umas-50 text-umas-600','')}${statCard(t('costPrice'),fmt(cost),'TZS','fa-coins','bg-red-50 text-red-600','')}${statCard(t('profitMonth'),fmt(total-cost),'TZS','fa-chart-line','bg-green-50 text-green-600','')}</div><canvas id="rpChart" height="200"></canvas></div>`;
setTimeout(()=>{const days=[],dd=[];let d=new Date(from);while(d<=new Date(to)){const ds=d.toISOString().split('T')[0];days.push(ds.slice(5));dd.push(sales.filter(s=>s.date===ds).reduce((a,s)=>a+s.total,0));d.setDate(d.getDate()+1)}if(charts.rp)charts.rp.destroy();const ctx=document.getElementById('rpChart');if(ctx)charts.rp=new Chart(ctx,{type:'bar',data:{labels:days,datasets:[{data:dd,backgroundColor:'rgba(217,119,6,0.7)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)}},x:{grid:{display:false}}}}})},50)}
else{const products=getData('products',[]);const totalVal=products.reduce((a,p)=>a+p.cost*p.stock,0);
el.innerHTML=`<div class="stat-card"><h3 class="font-display font-700 mb-3">${t('inventoryReport')}</h3><p class="text-xl font-display font-800 mb-4">${t('total')}: ${fmt(totalVal)} TZS</p><table class="data-table"><thead><tr><th>${t('productName')}</th><th>${t('stock')}</th><th>${t('costPrice')}</th><th>${t('total')}</th></tr></thead><tbody>${products.map(p=>`<tr><td>${esc(p.name)}</td><td>${p.stock}</td><td>${fmt(p.cost)}</td><td>${fmt(p.cost*p.stock)}</td></tr>`).join('')}</tbody></table></div>`}}

/* ===== POS ===== */
function renderPOS(){const products=getData('products',[]).filter(p=>p.stock>0);const cTotal=cart.reduce((a,c)=>a+c.qty*c.price,0);
document.getElementById('sec-pos').innerHTML=`<div class="grid lg:grid-cols-3 gap-4"><div class="lg:col-span-2"><div class="stat-card mb-4"><input type="text" class="form-input" id="pos-search" placeholder="${t('searchBarcode')}" oninput="filterPOS(this.value)"></div><div class="grid grid-cols-3 md:grid-cols-4 gap-3" id="pos-grid">${products.map(p=>`<div class="pos-product-card" data-bc="${p.barcode||''}" data-nm="${esc(p.name.toLowerCase())}" onclick="addToCart('${p.id||p.code}')"><div class="text-xs mb-1 text-stone-400">${p.code}</div><div class="text-sm font-600 mb-1">${esc(p.name)}</div><div class="text-sm font-700 text-umas-700">${fmt(p.price)}</div><div class="text-xs mt-1 text-stone-400">${t('stock')}: ${p.stock}</div></div>`).join('')}</div></div><div class="lg:col-span-1"><div class="stat-card" style="position:sticky;top:20px"><h3 class="text-sm font-display font-700 mb-3">${t('cart')} (${cart.length})</h3><div style="max-height:350px;overflow-y:auto">${cart.length===0?`<p class="text-center py-6 text-stone-400">${t('empty')}</p>`:cart.map((c,i)=>`<div class="cart-item"><div class="flex-1"><p class="text-sm font-600">${esc(c.name)}</p><p class="text-xs text-stone-400">${fmt(c.price)} x ${c.qty}</p></div><div class="flex items-center gap-2"><span class="text-sm font-700">${fmt(c.qty*c.price)}</span><button class="btn-icon" style="width:24px;height:24px;color:var(--danger)" onclick="removeCart(${i})"><i class="fas fa-times" style="font-size:9px"></i></button></div></div>`).join('')}</div><div class="mt-4 pt-4 border-t border-stone-200"><div class="flex justify-between mb-2"><span class="text-sm text-stone-400">${t('total')}</span><span class="text-lg font-display font-800 text-umas-700">${fmt(cTotal)}</span></div><div class="mb-3"><label class="form-label">${t('paymentMethod')}</label><select class="form-select" id="pos-pay"><option value="cash">${t('cash')}</option><option value="mobile">${t('mobileMoney')}</option></select></div><button class="btn btn-primary w-full justify-center" onclick="completeSale()"${cart.length===0?' disabled':''}><i class="fas fa-check"></i> ${t('pay')}</button><button class="btn btn-secondary btn-sm w-full justify-center mt-2" onclick="cart=[];renderPOS()">${t('clearCart')}</button></div></div></div></div>`}
function filterPOS(v){v=v.toLowerCase();document.querySelectorAll('#pos-grid .pos-product-card').forEach(el=>{const bc=el.getAttribute('data-bc')||'';const nm=el.getAttribute('data-nm')||'';el.style.display=(bc.includes(v)||nm.includes(v))?'':'none'})}
function addToCart(pid){const products=getData('products',[]);const p=products.find(x=>(x.id||x.code)===pid);if(!p)return;const ex=cart.find(c=>c.id===(p.id||p.code));if(ex){if(ex.qty>=p.stock){toast('Stock insufficient','warning');return}ex.qty++}else cart.push({id:p.id||p.code,name:p.name,price:p.price,cost:p.cost,qty:1});renderPOS()}
function removeCart(i){cart.splice(i,1);renderPOS()}
function completeSale(){if(!cart.length)return;const sales=getData('sales',[]);const products=getData('products',[]);const pay=document.getElementById('pos-pay').value;const customers=getData('customers',[]);const cCode=customers.length>0?customers[0].code:'WALK-IN';
cart.forEach(c=>{const total=c.qty*c.price;sales.push({id:genId('RCPT'),date:today(),customer:cCode,product:c.id,productName:c.name,qty:c.qty,price:c.price,discount:0,vat:0,payment:pay,total,cost:c.cost*c.qty});const pi=products.findIndex(x=>(x.id||x.code)===c.id);if(pi>-1)products[pi].stock=Math.max(0,products[pi].stock-c.qty)});
setData('sales',sales);setData('products',products);addAudit('sale',cart.length+' items');toast(t('saleComplete')||'Sale completed!','success');cart=[];renderPOS()}

/* ===== SECURITY (Change Password) ===== */
function renderSecurity(){
document.getElementById('sec-security').innerHTML=`<div class="mb-6"><h1 class="text-2xl font-display font-800">${t('security')}</h1></div><div class="stat-card" style="max-width:450px"><h3 class="font-display font-700 mb-4">${t('changePassword')}</h3><form onsubmit="return handleChangePW(event)"><div class="mb-4"><label class="form-label">${t('currentPass')}</label><input type="password" class="form-input" id="sec-cur" required></div><div class="mb-4"><label class="form-label">${t('newPass')}</label><input type="password" class="form-input" id="sec-new" required oninput="updatePwStrength(this.value)"><div class="pw-strength mt-1" style="background:var(--border)"><div class="pw-strength-bar" id="pwStrBar" style="width:0"></div></div><p class="text-xs mt-1 text-stone-400" id="pwStrText"></p></div><div class="mb-6"><label class="form-label">${t('confirmPass')}</label><input type="password" class="form-input" id="sec-cfm" required></div><button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> ${t('update')}</button></form></div>`}
async function handleChangePW(e){e.preventDefault();const cur=document.getElementById('sec-cur').value;const nw=document.getElementById('sec-new').value;const cfm=document.getElementById('sec-cfm').value;
if(!cur||!nw){toast(t('errorFill'),'error');return false}
if(nw.length<6){toast(t('pwShort'),'error');return false}
if(nw!==cfm){toast(t('pwMismatch'),'error');return false}
const users=getData('users',[]);const idx=users.findIndex(u=>u.id===currentUser.id);if(idx<0)return false;
const hash=await hashPW(cur,users[idx].salt);if(hash!==users[idx].password){toast(t('loginError'),'error');return false}
const newHash=await hashPW(nw,users[idx].salt);users[idx].passwordHistory=users[idx].passwordHistory||[];if(users[idx].passwordHistory.includes(newHash)){toast('Cannot reuse old password','error');return false}
users[idx].passwordHistory.push(newHash);if(users[idx].passwordHistory.length>5)users[idx].passwordHistory.shift();users[idx].password=newHash;setData('users',users);addAudit('password_change','Password changed');toast(t('pwChanged'),'success');renderSecurity();return false}

/* ================================================
   SUPER ADMIN SECTIONS
   ================================================ */

/* ===== SA USERS ===== */
function renderSAUsers(){const users=getData('users',[]);const online=users.filter(u=>u.status==='active').length;
const statusColors={active:'badge-success',pending:'badge-warning',suspended:'badge-danger',disabled:'badge-gray',locked:'badge-danger',expired:'badge-gray'};
document.getElementById('sec-sa-users').innerHTML=`<div class="flex items-center justify-between mb-6 flex-wrap gap-3"><h1 class="text-2xl font-display font-800">${t('manageUsers')}</h1><div class="flex gap-2"><button class="btn btn-primary" onclick="openSAUserModal()"><i class="fas fa-user-plus"></i> ${t('addUser')}</button><button class="btn btn-secondary" onclick="exportUsers()"><i class="fas fa-file-export"></i> ${t('exportUsers')}</button></div></div>
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6"><div class="sa-stat"><p class="text-2xl font-display font-800 text-umas-700">${users.length}</p><p class="text-xs text-stone-400">${t('totalUsers')}</p></div><div class="sa-stat"><p class="text-2xl font-display font-800 text-green-600">${users.filter(u=>u.status==='active').length}</p><p class="text-xs text-stone-400">${t('active')}</p></div><div class="sa-stat"><p class="text-2xl font-display font-800 text-amber-600">${users.filter(u=>u.status==='pending').length}</p><p class="text-xs text-stone-400">${t('pending')}</p></div><div class="sa-stat"><p class="text-2xl font-display font-800 text-blue-600">${online}</p><p class="text-xs text-stone-400">${t('onlineUsers')}</p></div></div>
<div class="stat-card mb-4"><input type="text" class="form-input" placeholder="${t('search')}" oninput="filterSAUsers(this.value)"></div>
<div class="stat-card overflow-x-auto"><table class="data-table"><thead><tr><th>${t('username')}</th><th>${t('fullName')}</th><th>${t('email')}</th><th>${t('role')}</th><th>${t('status')}</th><th>${t('lastLogin')}</th><th>${t('actions')}</th></tr></thead><tbody id="saUsersBody">${renderSAUsersRows(users)}</tbody></table></div>`}
function renderSAUsersRows(users){const statusColors={active:'badge-success',pending:'badge-warning',suspended:'badge-danger',disabled:'badge-gray',locked:'badge-danger',expired:'badge-gray'};return users.length===0?`<tr><td colspan="7" class="text-center py-8 text-stone-400">${t('empty')}</td></tr>`:users.map(u=>{const roleKey=u.role==='super_admin'?'superAdmin':u.role==='sales_person'?'salesPerson':u.role;return`<tr data-un="${esc(u.username.toLowerCase())}"><td class="font-600">${esc(u.username)}</td><td>${esc(u.fullName||'')}</td><td class="text-xs">${esc(u.email||'')}</td><td><span class="badge badge-info">${t(roleKey)||u.role}</span></td><td><span class="badge ${statusColors[u.status]||'badge-gray'}">${t(u.status)}</span></td><td class="text-xs">${u.lastLogin?fmtDate(u.lastLogin):'—'}</td><td><div class="flex gap-1 flex-wrap">${u.role!=='super_admin'?`<button class="btn-icon" onclick="openSAUserModal('${u.id}')" title="${t('editUser')}"><i class="fas fa-pen"></i></button><button class="btn-icon" onclick="saResetPW('${u.id}')" title="${t('resetPW')}"><i class="fas fa-key"></i></button><button class="btn-icon" onclick="saForcePW('${u.id}')" title="${t('forcePWChange')}"><i class="fas fa-exclamation-circle"></i></button><button class="btn-icon" onclick="saViewHistory('${u.id}')" title="${t('viewHistory')}"><i class="fas fa-history"></i></button><button class="btn-icon" onclick="saEditPerms('${u.id}')" title="${t('editPerms')}"><i class="fas fa-lock"></i></button><button class="btn-icon" onclick="saSetExpiry('${u.id}')" title="${t('setExpiry')}"><i class="fas fa-clock"></i></button>${u.status==='active'?`<button class="btn-icon" style="color:var(--warning)" onclick="saChangeStatus('${u.id}','suspended')" title="${t('suspendUser')}"><i class="fas fa-ban"></i></button><button class="btn-icon" style="color:#7c3aed" onclick="saChangeStatus('${u.id}','locked')" title="${t('lockUser')}"><i class="fas fa-lock"></i></button><button class="btn-icon" style="color:#78716c" onclick="saChangeStatus('${u.id}','disabled')" title="${t('disableUser')}"><i class="fas fa-eye-slash"></i></button>`:`<button class="btn-icon" style="color:var(--success)" onclick="saChangeStatus('${u.id}','active')" title="${t('activateUser')}"><i class="fas fa-check"></i></button>`}<button class="btn-icon" style="color:var(--danger)" onclick="saDeleteUser('${u.id}')" title="${t('delete')}"><i class="fas fa-trash"></i></button>`:'<span class="badge badge-purple" style="font-size:10px">SA</span>'}</div></td></tr>`}).join('')}
function filterSAUsers(v){v=v.toLowerCase();document.querySelectorAll('#saUsersBody tr[data-un]').forEach(r=>{r.style.display=r.getAttribute('data-un').includes(v)?'':'none'})}
function openSAUserModal(editId){const users=getData('users',[]);const u=editId?users.find(x=>x.id===editId):null;const roles=['administrator','manager','cashier','storekeeper','accountant','sales_person','viewer'];
openModal(`<h2 class="text-lg font-display font-700 mb-6">${u?t('editUser'):t('addUser')}</h2><form onsubmit="return saveSAUser(event,'${editId||''}')"><div class="grid grid-cols-2 gap-4 mb-4"><div><label class="form-label">${t('fullName')}</label><input class="form-input" id="su-name" value="${u?esc(u.fullName):''}" required></div><div><label class="form-label">${t('username')}</label><input class="form-input" id="su-user" value="${u?esc(u.username):''}" required ${u?'readonly':''}></div></div><div class="grid grid-cols-2 gap-4 mb-4"><div><label class="form-label">${t('phone')}</label><input class="form-input" id="su-phone" value="${u?esc(u.phone||''):''}"></div><div><label class="form-label">${t('email')}</label><input class="form-input" id="su-email" value="${u?esc(u.email||''):''}"></div></div><div class="mb-4"><label class="form-label">${t('role')}</label><select class="form-select" id="su-role">${roles.map(r=>`<option value="${r}"${u&&u.role===r?' selected':''}>${t(r==='sales_person'?'salesPerson':r)}</option>`).join('')}</select></div>${!u?`<div class="mb-4"><label class="form-label">${t('password')}</label><input type="password" class="form-input" id="su-pw" required oninput="updatePwStrength(this.value)"><div class="pw-strength mt-1" style="background:var(--border)"><div class="pw-strength-bar" id="pwStrBar" style="width:0"></div></div></div>`:''}<div class="flex gap-3"><button type="button" class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> ${t('save')}</button></div></form>`)}
async function saveSAUser(e,editId){e.preventDefault();const users=getData('users',[]);const name=document.getElementById('su-name').value.trim();const username=document.getElementById('su-user').value.trim();const phone=document.getElementById('su-phone').value.trim();const email=document.getElementById('su-email').value.trim();const role=document.getElementById('su-role').value;
if(!name||!username){toast(t('errorFill'),'error');return false}
if(editId){const idx=users.findIndex(u=>u.id===editId);if(idx>-1){users[idx].fullName=name;users[idx].phone=phone;users[idx].email=email;users[idx].role=role;users[idx].permissions={...DEFAULT_PERMS[role]||{}};setData('users',users);addAudit('update_user',username);toast(t('userUpdated'));closeModal();renderSAUsers()}return false}
if(users.find(u=>u.username===username)){toast(t('userExists'),'error');return false}
const pw=document.getElementById('su-pw').value;if(pw.length<6){toast(t('pwShort'),'error');return false}
const salt=generateSalt();const hash=await hashPW(pw,salt);
users.push({id:genId('USR'),fullName:name,username,phone,email,salt,password:hash,role,status:'pending',permissions:{...DEFAULT_PERMS[role]||{}},createdAt:new Date().toISOString(),lastLogin:null,loginCount:0,forcePasswordChange:false,expiresAt:null,failedAttempts:0,lockedUntil:null,passwordHistory:[hash]});
setData('users',users);addAudit('create_user',username);toast(t('userCreated'));closeModal();renderSAUsers();return false}
function saChangeStatus(userId,status){const users=getData('users',[]);const idx=users.findIndex(u=>u.id===userId);if(idx>-1){users[idx].status=status;if(status==='active')users[idx].failedAttempts=0;setData('users',users);addAudit('status_change',users[idx].username+' → '+status);toast(t('userUpdated'));renderSAUsers()}}
async function saResetPW(userId){const pw=prompt('Enter new password:');if(!pw||pw.length<6){toast(t('pwShort'),'error');return}const users=getData('users',[]);const idx=users.findIndex(u=>u.id===userId);if(idx>-1){const hash=await hashPW(pw,users[idx].salt);users[idx].password=hash;users[idx].forcePasswordChange=false;users[idx].passwordHistory=users[idx].passwordHistory||[];users[idx].passwordHistory.push(hash);setData('users',users);addAudit('reset_password',users[idx].username);toast(t('pwChanged'));renderSAUsers()}}
function saForcePW(userId){const users=getData('users',[]);const idx=users.findIndex(u=>u.id===userId);if(idx>-1){users[idx].forcePasswordChange=true;setData('users',users);addAudit('force_pw_change',users[idx].username);toast(t('userUpdated'));renderSAUsers()}}
function saViewHistory(userId){const history=getData('loginHistory',[]).filter(h=>h.userId===userId).slice(0,20);const u=getData('users',[]).find(x=>x.id===userId);
openModal(`<h2 class="text-lg font-display font-700 mb-4">${t('saLoginHistory')} — ${esc(u?u.username:'')}</h2><div class="overflow-x-auto"><table class="data-table"><thead><tr><th>${t('loginTime')}</th><th>${t('ipAddress')}</th><th>${t('browser')}</th><th>${t('device')}</th><th>${t('status')}</th></tr></thead><tbody>${history.length===0?`<tr><td colspan="5" class="text-center py-6 text-stone-400">${t('empty')}</td></tr>`:history.map(h=>`<tr><td class="text-xs">${new Date(h.loginTime).toLocaleString()}</td><td class="text-xs">${h.ip}</td><td class="text-xs">${h.browser}</td><td class="text-xs">${h.device}</td><td><span class="badge ${h.success?'badge-success':'badge-danger'}">${h.success?'Success':'Failed'}</span></td></tr>`).join('')}</tbody></table></div><div class="mt-4 text-right"><button class="btn btn-secondary" onclick="closeModal()">${t('close')}</button></div>`)}
function saSetExpiry(userId){const users=getData('users',[]);const u=users.find(x=>x.id===userId);if(!u)return;
openModal(`<h2 class="text-lg font-display font-700 mb-4">${t('setExpiry')} — ${esc(u.username)}</h2><div class="mb-4"><label class="form-label">${t('expires')}</label><input type="date" class="form-input" id="exp-date" value="${u.expiresAt?u.expiresAt.split('T')[0]:''}"></div><div class="flex gap-3"><button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveExpiry('${userId}')"><i class="fas fa-save"></i> ${t('save')}</button></div>`)}
function saveExpiry(userId){const d=document.getElementById('exp-date').value;const users=getData('users',[]);const idx=users.findIndex(u=>u.id===userId);if(idx>-1){users[idx].expiresAt=d?d+'T23:59:59.000Z':null;if(d&&new Date(d)<new Date())users[idx].status='expired';setData('users',users);addAudit('set_expiry',users[idx].username+' → '+d);toast(t('userUpdated'));closeModal();renderSAUsers()}}
function saEditPerms(userId){const users=getData('users',[]);const u=users.find(x=>x.id===userId);if(!u)return;const perms=u.permissions||{};
openModal(`<h2 class="text-lg font-display font-700 mb-4">${t('editPerms')} — ${esc(u.username)}</h2><div class="perm-grid mb-6">${PERM_KEYS.map(k=>`<div class="perm-item ${perms[k]?'on':'off'}" onclick="this.classList.toggle('on');this.classList.toggle('off')" data-perm="${k}"><i class="fas ${perms[k]?'fa-check-circle':'fa-times-circle'}"></i>${t('perm'+k.charAt(0).toUpperCase()+k.slice(1))}</div>`).join('')}</div><div class="flex gap-3"><button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="savePerms('${userId}')"><i class="fas fa-save"></i> ${t('save')}</button></div>`)}
function savePerms(userId){const users=getData('users',[]);const idx=users.findIndex(u=>u.id===userId);if(idx>-1){const perms={};document.querySelectorAll('.perm-item').forEach(el=>{perms[el.getAttribute('data-perm')]=el.classList.contains('on')?1:0});users[idx].permissions=perms;setData('users',users);addAudit('permissions_change',users[idx].username);toast(t('userUpdated'));closeModal();renderSAUsers()}}
function saDeleteUser(userId){const u=getData('users',[]).find(x=>x.id===userId);if(u&&u.role==='super_admin'){toast('Cannot delete Super Admin','error');return}confirmAction(t('confirmDelete'),()=>{setData('users',getData('users',[]).filter(x=>x.id!==userId));addAudit('delete_user',u?u.username:userId);toast(t('userDeleted'));renderSAUsers()})}
function exportUsers(){const users=getData('users',[]).map(u=>({Username:u.username,FullName:u.fullName,Email:u.email,Role:u.role,Status:u.status,Created:u.createdAt,LastLogin:u.lastLogin}));const ws=XLSX?null:null;const csv='Username,FullName,Email,Role,Status,Created\n'+users.map(u=>`${u.Username},${u.FullName},${u.Email},${u.Role},${u.Status},${u.Created}`).join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='umas_users_'+today()+'.csv';a.click();toast('Exported!','success')}

/* ===== SA ACCESS CODES ===== */
function renderSACodes(){const codes=getData('accessCodes',[]);const statusColors={active:'badge-success',expired:'badge-danger',disabled:'badge-gray'};
document.getElementById('sec-sa-codes').innerHTML=`<div class="flex items-center justify-between mb-6"><h1 class="text-2xl font-display font-800">${t('saCodes')}</h1><button class="btn btn-primary" onclick="generateNewCode()"><i class="fas fa-plus"></i> ${t('generateCode')}</button></div>
<div class="stat-card overflow-x-auto"><table class="data-table"><thead><tr><th>${t('codeValue')}</th><th>${t('codeStatus')}</th><th>${t('codeExpiry')}</th><th>${t('codeMaxUses')}</th><th>${t('codeUseCount')}</th><th>${t('actions')}</th></tr></thead><tbody>${codes.length===0?`<tr><td colspan="6" class="text-center py-8 text-stone-400">${t('empty')}</td></tr>`:codes.map(c=>`<tr><td class="font-mono font-600 tracking-wider">${esc(c.code)}</td><td><span class="badge ${statusColors[c.isActive?'active':'disabled']}">${c.isActive?t('active'):t('disabled')}</span></td><td class="text-xs">${c.expiresAt?fmtDate(c.expiresAt):'Never'}</td><td>${c.maxUses>0?c.maxUses:'∞'}</td><td>${c.useCount}</td><td class="flex gap-1"><button class="btn-icon" onclick="toggleCodeStatus('${c.id}')" title="${c.isActive?t('disableUser'):t('enableUser')}"><i class="fas ${c.isActive?'fa-eye-slash':'fa-eye'}"></i></button>${c.code!==SA_PASS?`<button class="btn-icon" style="color:var(--danger)" onclick="deleteCode('${c.id}')"><i class="fas fa-trash"></i></button>`:''}</td></tr>`).join('')}</tbody></table></div>`}
function generateNewCode(){const code=genId('AC').slice(0,10).toUpperCase();const codes=getData('accessCodes',[]);codes.push({id:genId('AC'),code,isActive:true,createdBy:currentUser.username,createdAt:new Date().toISOString(),expiresAt:null,maxUses:10,useCount:0,usedBy:[]});setData('accessCodes',codes);addAudit('generate_code',code);toast(t('userCreated'));renderSACodes()}
function toggleCodeStatus(codeId){const codes=getData('accessCodes',[]);const idx=codes.findIndex(c=>c.id===codeId);if(idx>-1){codes[idx].isActive=!codes[idx].isActive;setData('accessCodes',codes);addAudit('toggle_code',codes[idx].code);renderSACodes()}}
function deleteCode(codeId){confirmAction(t('confirmDelete'),()=>{setData('accessCodes',getData('accessCodes',[]).filter(c=>c.id!==codeId));toast(t('successDelete'));renderSACodes()})}

initData();
