<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Smart Firebase System</title>

  <style>
    body { font-family: Arial; margin: 20px; background:#f5f5f5; }
    input, textarea, select { width: 100%; margin: 5px 0; padding: 10px; }
    button { padding: 10px 15px; cursor: pointer; margin-top:5px;}
    table { width: 100%; border-collapse: collapse; margin-top:20px; background:#fff;}
    th, td { border: 1px solid #ccc; padding: 8px; text-align:left;}
    th { background:#eee; }
  </style>
</head>

<body>

<h2>📩 Sajili Taarifa za Mtoto</h2>

<input type="text" id="name" placeholder="Jina">
<input type="number" id="age" placeholder="Umri">
<select id="gender">
  <option value="">Chagua Jinsia</option>
  <option>Male</option>
  <option>Female</option>
</select>

<textarea id="message" placeholder="Maelezo"></textarea>

<button onclick="saveData()">💾 Hifadhi</button>

<hr>

<h2>🛠️ Admin Dashboard (Live)</h2>

<table>
  <thead>
    <tr>
      <th>Jina</th>
      <th>Umri</th>
      <th>Jinsia</th>
      <th>Maelezo</th>
      <th>Muda</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="dataList"></tbody>
</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";


// 🔐 CONFIG YAKO
const firebaseConfig = {
  apiKey: "AIzaSyBrtkRulxflRFp2ZfcnUuGHcmo57tkcRNI",
  authDomain: "ncrs-aeb43.firebaseapp.com",
  projectId: "ncrs-aeb43",
  storageBucket: "ncrs-aeb43.appspot.com",
  messagingSenderId: "786434442929",
  appId: "1:786434442929:web:7c91cb67f71a23904b4490"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ================= SAVE DATA =================
window.saveData = async function () {
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const gender = document.getElementById("gender").value;
  const message = document.getElementById("message").value;

  if (!name || !age || !gender || !message) {
    alert("⚠️ Tafadhali jaza kila sehemu");
    return;
  }

  try {
    await addDoc(collection(db, "children"), {
      name,
      age,
      gender,
      message,
      createdAt: serverTimestamp()
    });

    alert("✅ Imehifadhiwa!");

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("gender").value = "";
    document.getElementById("message").value = "";

  } catch (error) {
    alert("❌ Error: " + error.message);
  }
};



// ================= DELETE =================
window.deleteData = async function(id) {
  if (confirm("Unataka kufuta?")) {
    await deleteDoc(doc(db, "children", id));
  }
};



// ================= REALTIME =================
const q = query(collection(db, "children"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {

  let html = "";

  snapshot.forEach(docSnap => {
    const d = docSnap.data();

    let time = d.createdAt?.toDate().toLocaleString() || "Loading...";

    html += `
      <tr>
        <td>${d.name}</td>
        <td>${d.age}</td>
        <td>${d.gender}</td>
        <td>${d.message}</td>
        <td>${time}</td>
        <td>
          <button onclick="deleteData('${docSnap.id}')">🗑️ Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("dataList").innerHTML = html;

});

</script>

</body>
</html>
