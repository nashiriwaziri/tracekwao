<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASIFU - Together Safe Network</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}

/* HEADER */
.header {
    background:#002147;
    color:white;
    padding:15px;
    text-align:center;
}

/* CONTAINER */
.container {
    width:90%;
    margin:auto;
    padding:20px;
}

/* FORM */
.form-box {
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    margin-bottom:30px;
}

.form-box input, .form-box textarea, .form-box select {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.form-box button {
    background:#28a745;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    cursor:pointer;
}

/* PROFILE CARDS */
.card {
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card h3 {
    margin:0;
}

.role {
    color:#007bff;
    font-weight:bold;
}

.btn {
    display:inline-block;
    padding:8px 12px;
    margin-top:10px;
    background:#007bff;
    color:white;
    border-radius:5px;
    text-decoration:none;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <h2>WASIFU ZA WATAALAM, MAAFISA NA WATUMIAJI</h2>
</div>

<div class="container">

<!-- CREATE PROFILE -->
<div class="form-box">
    <h3>Ongeza Wasifu (Create Profile)</h3>

    <input type="text" id="name" placeholder="Full Name" required>
    
    <select id="role">
        <option value="">Select Role</option>
        <option>Officer</option>
        <option>Lawyer</option>
        <option>Social Worker</option>
        <option>Volunteer</option>
        <option>User</option>
    </select>

    <input type="text" id="phone" placeholder="Phone Number">

    <input type="text" id="location" placeholder="Location">

    <textarea id="bio" placeholder="Professional Description / Experience"></textarea>

    <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- DISPLAY PROFILES -->
<div id="profiles"></div>

</div>

<script>

/* STORAGE */
function getProfiles(){
    return JSON.parse(localStorage.getItem("profiles") || "[]");
}

function saveProfiles(data){
    localStorage.setItem("profiles", JSON.stringify(data));
}

/* SAVE PROFILE */
function saveProfile(){

    let name = document.getElementById("name").value;
    let role = document.getElementById("role").value;
    let phone = document.getElementById("phone").value;
    let location = document.getElementById("location").value;
    let bio = document.getElementById("bio").value;

    if(name=="" || role==""){
        alert("Name and Role required");
        return;
    }

    let profiles = getProfiles();

    profiles.push({
        id: Date.now(),
        name, role, phone, location, bio
    });

    saveProfiles(profiles);

    alert("Profile Saved Successfully");

    document.getElementById("name").value="";
    document.getElementById("role").value="";
    document.getElementById("phone").value="";
    document.getElementById("location").value="";
    document.getElementById("bio").value="";

    loadProfiles();
}

/* DISPLAY */
function loadProfiles(){

    let container = document.getElementById("profiles");
    container.innerHTML="";

    let profiles = getProfiles();

    profiles.reverse().forEach(p => {

        container.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <div class="role">${p.role}</div>
                <p><b>Location:</b> ${p.location}</p>
                <p>${p.bio}</p>

                <button class="btn" onclick="requestService('${p.name}','${p.phone}')">
                    Request Service
                </button>
            </div>
        `;
    });
}

/* REQUEST SERVICE */
function requestService(name, phone){

    let msg = prompt("Write your request message:");

    if(msg){
        alert("Request sent to " + name + "\nPhone: " + phone + "\n\nMessage:\n" + msg);

        /* OPTIONAL: SAVE REQUEST */
        let requests = JSON.parse(localStorage.getItem("requests") || "[]");

        requests.push({
            to:name,
            phone:phone,
            message:msg,
            date:new Date()
        });

        localStorage.setItem("requests", JSON.stringify(requests));
    }
}

loadProfiles();

</script>

</body>
</html>
