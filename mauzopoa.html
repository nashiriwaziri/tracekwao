body{font-family:"Space Grotesk",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.btn-a{background:linear-gradient(135deg,#d97706,#b45309);color:#fff;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-family:"Space Grotesk";transition:all .3s;font-size:14px;display:inline-flex;align-items:center;gap:8px}

.sidebar{width:250px;min-height:100vh;background:var(--card);border-right:1px solid var(--border);position:fixed;left:0;top:0;z-index:40;transition:transform .3s;overflow-y:auto;display:flex;flex-direction:column}

.sb-link:hover,.sb-link.active{background:rgba(13,148,136,.12);color:#14b8a6}

.bg{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.bg-ok{background:rgba(16,185,129,.12);color:#10b981}
.bg-warn{background:rgba(245,158,11,.12);color:#f59e0b}

.bg-info{background:rgba(6,182,212,.12);color:#06b6d4}
.bg-pur{background:rgba(139,92,246,.12);color:#8b5cf6}

.mdl-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;animation:scaleIn .25s ease}

@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 5px rgba(13,148,136,.3)}50%{box-shadow:0 0 20px rgba(13,148,136,.6)}}
.fu{animation:fadeUp .5s ease both}
.d1{animation-delay:.1s;opacity:0}.d2{animation-delay:.2s;opacity:0}.d3{animation-delay:.3s;opacity:0}.d4{animation-delay:.4s;opacity:0}

.tab-btn.active{background:rgba(13,148,136,.15);color:#14b8a6;border-color:rgba(13,148,136,.3)}
.tab-btn:hover:not(.active){color:var(--text)}
.step-ind{display:flex;align-items:center;gap:8px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);color:var(--muted);transition:all .3s}
.step-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
.step-dot.cur{border-color:var(--accent);color:var(--accent);animation:pulse-glow 2s infinite}
.step-line{width:40px;height:2px;background:var(--border);transition:all .3s}
.step-line.done{background:var(--accent)}

function t(k){try{return(TR[lang]&&TR[lang][k])||k}catch(e){return k}}

/* ── 4. DATA LAYER ── */
function gd(k,def){try{if(_dc[k]!==undefined)return _dc[k];var d=localStorage.getItem('mp2_'+k);if(d){_dc[k]=JSON.parse(d);return _dc[k]}return def}catch(e){return def}}
function sd(k,v){try{_dc[k]=v;localStorage.setItem('mp2_'+k,JSON.stringify(v))}catch(e){}}
function flushCache(k){if(k)delete _dc[k];else _dc={}}

/* Data filtered by current user's businessId */
function bGet(key){var all=gd(key,[]);if(!USR||USR.role==='super_admin')return all;return all.filter(function(x){return x.businessId===USR.businessId})}
function bAdd(key,item){if(USR){item.businessId=USR.businessId;item.createdBy=USR.id}item.createdDate=new Date().toISOString();item.updatedDate=new Date().toISOString();var all=gd(key,[]);all.push(item);sd(key,all)}
function bUpdate(key,id,ups){var all=gd(key,[]);for(var i=0;i<all.length;i++){if(all[i].id===id&&(USR.role==='super_admin'||all[i].businessId===USR.businessId)){Object.assign(all[i],ups,{updatedDate:new Date().toISOString()});break}}sd(key,all)}
function bDel(key,id){var all=gd(key,[]);sd(key,all.filter(function(x){return!(x.id===id&&(USR.role==='super_admin'||x.businessId===USR.businessId))}))}

/* ── 5. UTILITIES ── */
function fmt(n){try{return new Intl.NumberFormat('en-TZ').format(Math.round(n||0))}catch(e){return String(n||0)}}
function fmtD(d){try{return new Date(d).toLocaleDateString(lang==='sw'?'sw-TZ':'en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return d||''}}
function genId(p){return p+'-'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase()}
function today(){return new Date().toISOString().split('T')[0]}
function ago(n,u){var d=new Date();if(u==='d')d.setDate(d.getDate()-n);else if(u==='m')d.setMonth(d.getMonth()-n);else d.setFullYear(d.getFullYear()-n);return d.toISOString().split('T')[0]}
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hashPw(pw){var h=5381;for(var i=0;i<pw.length;i++){h=((h<<5)+h)+pw.charCodeAt(i);h=h&h}return 'h'+Math.abs(h).toString(36)+pw.length}
function daysBetween(d1,d2){return Math.ceil((new Date(d2)-new Date(d1))/(1000*60*60*24))}

/* ── 6. TOAST ── */
function toast(msg,type){
  type=type||'ok';var c=document.getElementById('toast-c');if(!c)return;
  var el=document.createElement('div');el.className='toast toast-'+type;
  var icons={ok:'fa-check-circle',err:'fa-times-circle',warn:'fa-exclamation-triangle'};
  el.innerHTML='<i class="fas '+(icons[type]||icons.ok)+'"></i><span>'+esc(msg)+'</span>';
  c.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transform='translateX(40px)';el.style.transition='all .3s';setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},300)},3500);
}

function doLoginAction(email,pw){
  email=(email||'').trim().toLowerCase();
  /* Check Super Admin */
  if(email===_SA_E()&&pw===_SA_P()){
    USR={id:'sa_root',name:'Super Administrator',email:_SA_E(),phone:'',role:'super_admin',businessId:'system',status:'active'};
    try{localStorage.setItem('mp2_session',JSON.stringify(USR))}catch(e){}
    addAudit('login','Super Admin');nav('sa_dashboard');return true;
  }
  /* Check business users */
  var users=gd('users',[]);
  var found=users.find(function(u){return u.email===email&&u.password===hashPw(pw)});
  if(!found){toast(t('login_error'),'err');return false}
  /* Check business status */
  var biz=getBusiness(found.businessId);
  if(!biz){toast(t('login_error'),'err');return false}

function doSignup(bizName,fullName,phone,email,pw,pw2,logoData){
  if(!bizName||!fullName||!phone||!email||!pw){toast(t('fill_required'),'err');return false}
  if(pw!==pw2){toast(t('password_mismatch'),'err');return false}
  if(pw.length<6){toast('Nenosiri lazima liwe na angalau herufi 6','err');return false}
  email=email.trim().toLowerCase();
  var users=gd('users',[]);
  if(users.find(function(u){return u.email===email})){toast('Barua pepe tayari imesajiliwa','err');return false}
  var bizId=genId('BIZ');
  var biz={id:bizId,name:bizName,logo:logoData||'',address:'',phone:phone,bizEmail:email,tin:'',vrn:'',currency:'TZS',receiptFooter:'',status:'pending',createdAt:new Date().toISOString(),settings:{currency:'TZS',taxRate:0}};
  var user={id:genId('USR'),businessId:bizId,name:fullName,email:email,phone:phone,password:hashPw(pw),role:'admin',status:'active',createdAt:new Date().toISOString()};
  var bs=gd('businesses',[]);bs.push(biz);sd('businesses',bs);
  users.push(user);sd('users',users);
  addAudit('signup','Business: '+bizName);
  toast(t('saved_ok'),'ok');
  nav('activation');return true;
}

function doActivate(code){
  code=(code||'').trim().toUpperCase();
  var lics=gd('licenses',[]);
  var lic=lics.find(function(l){return l.code===code&&l.status==='valid'});
  if(!lic){toast(t('invalid_code'),'err');return false}
  var bs=gd('businesses',[]);
  var biz=bs.find(function(b){return b.id===lic.businessId});
  if(!biz){toast(t('invalid_code'),'err');return false}
  if(biz.status==='active'){toast('Akaunti tayari imewashwa','warn');nav('login');return false}
  biz.status='active';sd('businesses',bs);
  addAudit('activate','Business activated: '+biz.name);
  toast(t('account_activated'),'ok');
  nav('login');return true;
}

/* Forgot Password */
function startForgot(email){
  email=(email||'').trim().toLowerCase();
  var users=gd('users',[]);
  var found=users.find(function(u){return u.email===email});
  if(!found){toast('Barua pepe haipatikani','err');return false}
  _fpEmail=email;_fpOtp=String(Math.floor(100000+Math.random()*900000));
  found.resetOtp=_fpOtp;found.resetOtpExpiry=Date.now()+600000;
  sd('users',users);
  toast(t('otp_sent'),'ok');
  nav('forgot_otp');return true;
}
function verifyOtp(otp){
  var users=gd('users',[]);var found=users.find(function(u){return u.email===_fpEmail&&u.resetOtp===otp&&u.resetOtpExpiry>Date.now()});
  if(!found){toast('Kodi si sahihi au imekwisha','err');return false}
  nav('forgot_newpw');return true;
}
function setNewPw(pw,pw2){
  if(pw!==pw2){toast(t('password_mismatch'),'err');return false}
  if(pw.length<6){toast('Nenosiri lazima liwe na angalau herufi 6','err');return false}
  var users=gd('users',[]);var found=users.find(function(u){return u.email===_fpEmail});
  if(!found){toast('Hitilafu','err');return false}
  found.password=hashPw(pw);delete found.resetOtp;delete found.resetOtpExpiry;
  sd('users',users);_fpEmail='';_fpOtp='';
  toast(t('password_changed'),'ok');nav('login');return true;
}

function vDashboard(){
  var sales=bGet('sales'),prods=bGet('products'),exps=bGet('expenses');
  var td=today(),wk=ago(7,'d'),mn=ago(1,'m'),yr=ago(1,'y');
  var fS=function(a,b){return sales.filter(function(s){return s.date>=a&&s.date<=b})};
  var sumT=function(arr){return arr.reduce(function(a,s){return a+(s.total||0)},0)};
  var sumP=function(arr){return arr.reduce(function(a,s){return a+((s.total||0)-(s.cost||0))},0)};
  var sTD=fS(td,td),sWK=fS(wk,td),sMN=fS(mn,td),sYR=fS(yr,td);
  var expMN=exps.filter(function(e){return e.date>=mn}).reduce(function(a,e){return a+(e.amount||0)},0);
  var lowStk=prods.filter(function(p){return p.stock<=(p.reorder||10)}).slice(0,5);
  var topP=[];var pMap={};sales.forEach(function(s){if(!pMap[s.product])pMap[s.product]={code:s.product,qty:0,total:0};pMap[s.product].qty+=s.qty;pMap[s.product].total+=s.total});
  Object.values(pMap).sort(function(a,b){return b.total-a.total}).slice(0,5).forEach(function(tp){var pr=prods.find(function(x){return x.code===tp.code});topP.push({name:pr?pr.name:tp.code,total:tp.total,qty:tp.qty})});
  return'<div class="flex items-center justify-between mb-6 flex-wrap gap-3"><div><h1 class="text-2xl font-display font-800">'+t('dashboard')+'</h1><p class="text-sm mt-1" style="color:var(--muted)">'+t('welcome')+', '+esc(USR.name)+' &mdash; '+fmtD(td)+'</p></div>'
    +'<div class="flex gap-2"><button class="btn-p btn-sm" onclick="nav(\'pos\')"><i class="fas fa-cash-register"></i> POS</button><button class="btn-a btn-sm" onclick="nav(\'reports\')"><i class="fas fa-file-alt"></i> '+t('reports')+'</button></div></div>'
    +'<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">'
    +statC(t('sales_today'),fmt(sumT(sTD)),'TZS','fa-shopping-cart','#0d9488','d1')
    +statC(t('sales_week'),fmt(sumT(sWK)),'TZS','fa-calendar-week','#06b6d4','d2')
    +statC(t('sales_month'),fmt(sumT(sMN)),'TZS','fa-calendar-alt','#8b5cf6','d3')
    +statC(t('profit_month'),fmt(sumP(sMN)),'TZS','fa-coins','#10b981','d4')+'</div>'
    +'<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">'
    +statC(t('sales_year'),fmt(sumT(sYR)),'TZS','fa-calendar','#ec4899','d1')
    +statC(t('total_products'),prods.length,'','fa-box','#06b6d4','d2')
    +statC(t('total_expenses'),fmt(expMN),'TZS','fa-money-bill-wave','#ef4444','d3')
    +statC(t('profit_today'),fmt(sumP(sTD)),'TZS','fa-coins','#d97706','d4')+'</div>'
    +'<div class="grid lg:grid-cols-2 gap-4 mb-6">'
    +'<div class="card"><h3 class="text-sm font-display font-700 mb-4">'+t('sales_chart')+'</h3><canvas id="ch-sales" height="200"></canvas></div>'
    +'<div class="card"><h3 class="text-sm font-display font-700 mb-4">'+t('profit_chart')+'</h3><canvas id="ch-profit" height="200"></canvas></div></div>'
    +'<div class="grid lg:grid-cols-2 gap-4">'
    +'<div class="card"><h3 class="text-sm font-display font-700 mb-4">'+t('top_products')+'</h3>'
    +(topP.length?topP.map(function(p,i){return'<div class="flex items-center justify-between py-2'+(i<topP.length-1?' border-b':'')+'" style="border-color:var(--border)"><div class="flex items-center gap-3"><span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold" style="background:'+(i<3?'linear-gradient(135deg,#0d9488,#06b6d4)':'var(--card2)')+';color:'+(i<3?'#fff':'var(--muted)')+'">'+(i+1)+'</span><span class="text-sm">'+esc(p.name)+'</span></div><span class="text-sm font-600" style="color:var(--accent)">'+fmt(p.total)+'</span></div>'}).join(''):'<p class="text-sm" style="color:var(--muted)">'+t('no_data')+'</p>')+'</div>'
    +'<div class="card"><h3 class="text-sm font-display font-700 mb-4">'+t('low_stock')+'</h3>'
    +(lowStk.length?lowStk.map(function(p){return'<div class="flex items-center justify-between py-2 border-b" style="border-color:var(--border)"><div><p class="text-sm">'+esc(p.name)+'</p><p class="text-xs" style="color:var(--muted)">'+t('stock')+': '+p.stock+' / '+t('reorder_level')+': '+p.reorder+'</p></div><span class="bg bg-bad">'+p.stock+'</span></div>'}).join(''):'<p class="text-sm" style="color:var(--muted)">'+t('no_data')+'</p>')+'</div></div>';
}
function initDashCharts(){

  for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);var ds=d.toISOString().split('T')[0];days.push(d.toLocaleDateString(lang==='sw'?'sw-TZ':'en-GB',{weekday:'short'}));var dayS=sales.filter(function(s){return s.date===ds});sD.push(dayS.reduce(function(a,s){return a+(s.total||0)},0));pD.push(dayS.reduce(function(a,s){return a+((s.total||0)-(s.cost||0))},0))}

}

function initPOS(){var s=document.getElementById('pos-search');if(s)s.focus()}
function filterPOS(){var q=(document.getElementById('pos-search').value||'').toLowerCase();document.querySelectorAll('#pos-grid .pos-prod').forEach(function(el){var n=el.getAttribute('data-name'),b=el.getAttribute('data-barcode');el.style.display=(n.indexOf(q)!==-1||b.indexOf(q)!==-1)?'':'none'})}
function filterPOS_cat(btn,cat){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');document.querySelectorAll('#pos-grid .pos-prod').forEach(function(el){el.style.display=(cat==='all'||el.getAttribute('data-cat')===cat)?'':'none'})}
function addToCart(pid){var prods=bGet('products');var p=prods.find(function(x){return x.id===pid});if(!p)return;var existing=cart.find(function(c){return c.pid===pid});if(existing){if(existing.qty>=p.stock){toast('Stoki haitoshi','warn');return}existing.qty++}else{cart.push({pid:pid,name:p.name,price:p.price,cost:p.cost,code:p.code,qty:1,maxStock:p.stock})}render()}
function cartQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);else if(cart[i].qty>cart[i].maxStock){cart[i].qty=cart[i].maxStock;toast('Stoki haitoshi','warn')}render()}
function cartRemove(i){cart.splice(i,1);render()}
function updateCartTotals(){var sub=cart.reduce(function(a,c){return a+c.price*c.qty},0);var disc=parseInt(document.getElementById('cart-disc').value)||0;var tot=sub-Math.round(sub*disc/100);var cs=document.getElementById('cart-sub');var ct=document.getElementById('cart-total');if(cs)cs.textContent=fmt(sub);if(ct)ct.textContent=fmt(tot)}
function completeSale(){
  if(!cart.length){toast(t('empty'),'warn');return}
  var sub=cart.reduce(function(a,c){return a+c.price*c.qty},0);var disc=parseInt(document.getElementById('cart-disc').value)||0;var total=sub-Math.round(sub*disc/100);

function vReports(){

function initReports(){}
function generateReport(){
  var type=document.getElementById('rpt-type').value;var from=document.getElementById('rpt-from').value;var to=document.getElementById('rpt-to').value;
  var sales=bGet('sales').filter(function(s){return s.date>=from&&s.date<=to});var exps=bGet('expenses').filter(function(e){return e.date>=from&&e.date<=to});var prods=bGet('products');
  var biz=getBusiness(USR.businessId);
  var html='';
  if(type==='sales'){var tot=sales.reduce(function(a,s){return a+s.total},0);html='<div class="card"><div class="flex justify-between items-center mb-4"><h3 class="font-display font-700">'+t('sales_report')+' ('+fmtD(from)+' - '+fmtD(to)+')</h3><div class="flex gap-2"><button class="btn-p btn-sm" onclick="exportRptPDF(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn-ok btn-sm" onclick="exportRptExcel(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-excel"></i> Excel</button></div></div><p class="text-2xl font-display font-900" style="color:var(--accent)">'+fmt(tot)+' TZS</p><p class="text-sm mt-1" style="color:var(--muted)">'+sales.length+' transactions</p></div>'}
  else if(type==='profit'){var rev=sales.reduce(function(a,s){return a+s.total},0);var csts=sales.reduce(function(a,s){return a+(s.cost||0)},0);var expT=exps.reduce(function(a,e){return a+e.amount},0);var net=rev-csts-expT;html='<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">'+statC('Revenue',fmt(rev),'TZS','fa-arrow-up','#0d9488','d1')+statC('Cost of Goods',fmt(csts),'TZS','fa-box','#ef4444','d2')+statC('Expenses',fmt(expT),'TZS','fa-money-bill','#f59e0b','d3')+statC('Net Profit',fmt(net),'TZS','fa-coins',net>=0?'#10b981':'#ef4444','d4')+'</div><div class="card"><div class="flex justify-between items-center mb-2"><h3 class="font-display font-700">'+t('profit_report')+'</h3><div class="flex gap-2"><button class="btn-p btn-sm" onclick="exportRptPDF(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn-ok btn-sm" onclick="exportRptExcel(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-excel"></i> Excel</button></div></div></div>'}
  else if(type==='expense'){var expT=exps.reduce(function(a,e){return a+e.amount},0);html='<div class="card"><div class="flex justify-between items-center mb-4"><h3 class="font-display font-700">'+t('expense_report')+' ('+fmtD(from)+' - '+fmtD(to)+')</h3><div class="flex gap-2"><button class="btn-p btn-sm" onclick="exportRptPDF(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn-ok btn-sm" onclick="exportRptExcel(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-excel"></i> Excel</button></div></div><p class="text-2xl font-display font-900" style="color:var(--danger)">'+fmt(expT)+' TZS</p></div>'}
  else{html='<div class="card"><div class="flex justify-between items-center mb-4"><h3 class="font-display font-700">'+t('inventory_report')+'</h3><div class="flex gap-2"><button class="btn-p btn-sm" onclick="exportRptPDF(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn-ok btn-sm" onclick="exportRptExcel(\''+type+'\',\''+from+'\',\''+to+'\')"><i class="fas fa-file-excel"></i> Excel</button></div></div>'
    +'<table><thead><tr><th>'+t('product_name')+'</th><th>'+t('stock')+'</th><th>'+t('cost_price')+'</th><th>'+t('selling_price')+'</th><th>'+t('total')+'</th></tr></thead><tbody>'+prods.map(function(p){return'<tr><td>'+esc(p.name)+'</td><td>'+p.stock+'</td><td>'+fmt(p.cost)+'</td><td>'+fmt(p.price)+'</td><td class="font-600">'+fmt(p.stock*p.price)+'</td></tr>'}).join('')+'</tbody></table></div>'}
  document.getElementById('rpt-result').innerHTML=html;
}
function exportRptPDF(type,from,to){
  try{var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF();var biz=getBusiness(USR.businessId);doc.setFontSize(18);doc.text((biz&&biz.name)||'Business Report',14,20);doc.setFontSize(10);doc.text('Date: '+fmtD(from)+' - '+fmtD(to),14,28);if(biz&&biz.phone)doc.text('Phone: '+biz.phone,14,34);if(biz&&biz.tin)doc.text('TIN: '+biz.tin,14,40);
  if(biz&&biz.logo){try{doc.addImage(biz.logo,'PNG',14,2,20,20)}catch(e){}}
  doc.setFontSize(12);doc.text(type.toUpperCase()+' REPORT',14,50);var y=60;var sales=bGet('sales').filter(function(s){return s.date>=from&&s.date<=to});
  if(type==='sales'){sales.forEach(function(s){if(y>270){doc.addPage();y=20}doc.setFontSize(9);doc.text(s.id+' | '+s.date+' | '+s.product+' x'+s.qty+' | '+fmt(s.total),14,y);y+=6})}
  else if(type==='profit'){var rev=sales.reduce(function(a,s){return a+s.total},0);var csts=sales.reduce(function(a,s){return a+(s.cost||0)},0);doc.setFontSize(10);doc.text('Revenue: '+fmt(rev),14,y);y+=8;doc.text('COGS: '+fmt(csts),14,y);y+=8;doc.text('Net Profit: '+fmt(rev-csts),14,y)}
  else if(type==='inventory'){var prods=bGet('products');prods.forEach(function(p){if(y>270){doc.addPage();y=20}doc.setFontSize(9);doc.text(p.name+' | Stock: '+p.stock+' | Value: '+fmt(p.stock*p.price),14,y);y+=6})}
  doc.save('report-'+type+'-'+today()+'.pdf');toast('PDF exported','ok')}catch(e){toast('PDF export error','err')}}
function exportRptExcel(type,from,to){
  try{var biz=getBusiness(USR.businessId);var rows=[];var sales=bGet('sales').filter(function(s){return s.date>=from&&s.date<=to});
  if(type==='sales'){rows.push(['Receipt','Date','Product','Qty','Total']);sales.forEach(function(s){rows.push([s.id,s.date,s.product,s.qty,s.total])})}
  else if(type==='profit'){rows.push(['Revenue','COGS','Net Profit']);var rev=sales.reduce(function(a,s){return a+s.total},0);var csts=sales.reduce(function(a,s){return a+(s.cost||0)},0);rows.push([rev,csts,rev-csts])}
  else if(type==='inventory'){rows.push(['Product','Stock','Cost','Price','Value']);bGet('products').forEach(function(p){rows.push([p.name,p.stock,p.cost,p.price,p.stock*p.price])})}
  var ws=XLSX.utils.aoa_to_sheet(rows);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Report');XLSX.writeFile(wb,'report-'+type+'-'+today()+'.xlsx');toast('Excel exported','ok')}catch(e){toast('Excel export error','err')}}

/* ── 37. AI CENTER ── */
function vAICenter(){
  var sales=bGet('sales'),prods=bGet('products');
  var totalSales=sales.reduce(function(a,s){return a+s.total},0);
  var pMap={};sales.forEach(function(s){pMap[s.product]=(pMap[s.product]||0)+s.total});
  var best=Object.entries(pMap).sort(function(a,b){return b[1]-a[1]}).slice(0,3);
  var avgSale=sales.length?totalSales/sales.length:0;
  var healthScore=Math.min(100,Math.round((prods.filter(function(p){return p.stock>p.reorder}).length/Math.max(prods.length,1))*60+(sales.length>10?30:10)+10));
  return'<div class="mb-6"><h1 class="text-xl font-display font-800"><i class="fas fa-brain mr-2" style="color:var(--accent)"></i>'+t('ai_center')+'</h1></div>'

    +'<div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">'
    +'<div class="card text-center"><div class="w-16 h-16 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl font-display font-900" style="background:'+(healthScore>70?'linear-gradient(135deg,#059669,#10b981)':healthScore>40?'linear-gradient(135deg,#d97706,#f59e0b)':'linear-gradient(135deg,#dc2626,#ef4444)')+';color:#fff">'+healthScore+'</div><p class="text-sm font-600">'+t('health_score')+'</p></div>'
    +'<div class="card"><p class="text-xs" style="color:var(--muted)">'+t('sales_prediction')+'</p><p class="text-lg font-display font-800 mt-2" style="color:var(--accent)">~'+fmt(Math.round(avgSale*30))+'</p><p class="text-xs" style="color:var(--muted)">Projected monthly sales</p></div>'
    +'<div class="card"><p class="text-xs" style="color:var(--muted)">'+t('best_products')+'</p>'+best.map(function(b,i){var pn=prods.find(function(x){return x.code===b[0]});return'<p class="text-sm mt-2"><span class="bg bg-ok">'+(i+1)+'</span> '+esc(pn?pn.name:b[0])+'</p>'}).join('')+'</div>'
    +'<div class="card"><p class="text-xs" style="color:var(--muted)">'+t('inventory_opt')+'</p>'+prods.filter(function(p){return p.stock<=p.reorder}).slice(0,3).map(function(p){return'<p class="text-sm mt-2"><span class="bg bg-bad">Low</span> '+esc(p.name)+' ('+p.stock+')</p>'}).join('')+'</div></div>'
    +'<div class="grid md:grid-cols-2 gap-4"><div class="card"><h3 class="text-sm font-display font-700 mb-3">'+t('price_recommend')+'</h3>'+prods.slice(0,5).map(function(p){var recommended=Math.round(p.cost*(1+(p.overhead||10)/100)*1.2);return'<div class="flex items-center justify-between py-2 border-b" style="border-color:var(--border)"><span class="text-sm">'+esc(p.name)+'</span><div class="text-right"><span class="text-xs line-through" style="color:var(--muted)">'+fmt(p.price)+'</span> <span class="text-sm font-600" style="color:var(--accent)">'+fmt(recommended)+'</span></div></div>'}).join('')+'</div>'
    +'<div class="card"><h3 class="text-sm font-display font-700 mb-3">'+t('trend_detect')+'</h3><canvas id="ch-trend" height="200"></canvas></div></div>';
}
