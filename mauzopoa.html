<style>
:root{--bg:#0B1120;--card:#111B2E;--card2:#172340;--border:#1D2E50;--text:#E2E8F0;--muted:#7B8BA3;--accent:#0d9488;--accent2:#06b6d4;--danger:#EF4444;--success:#10B981;--warn:#F59E0B}

body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.btn-primary{background:linear-gradient(135deg,#0d9488,#06b6d4);color:#fff;padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-family:'Space Grotesk';transition:all .3s;font-size:14px}

.btn-danger:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(239,68,68,.3)}
.btn-secondary{background:var(--card2);color:var(--text);padding:10px 24px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-weight:500;font-family:'Space Grotesk';transition:all .3s;font-size:14px}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.input-field{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;width:100%;font-family:'Space Grotesk';font-size:14px;transition:border .3s;outline:none}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;transition:all .3s}
.card:hover{border-color:rgba(13,148,136,.3)}
.sidebar{width:260px;min-height:100vh;background:var(--card);border-right:1px solid var(--border);position:fixed;left:0;top:0;z-index:40;transition:transform .3s;overflow-y:auto}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 20px;color:var(--muted);cursor:pointer;transition:all .2s;border-radius:8px;margin:2px 10px;font-size:14px}
.sidebar-link:hover,.sidebar-link.active{background:rgba(13,148,136,.15);color:#14b8a6}
.sidebar-link.active{font-weight:600}
.main-content{margin-left:260px;min-height:100vh;padding:24px}
.stat-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(13,148,136,.1)}
table{width:100%;border-collapse:collapse}
th{background:var(--card2);color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
tr:hover td{background:rgba(13,148,136,.05)}
.badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(16,185,129,.15);color:#10B981}
.badge-warning{background:rgba(245,158,11,.15);color:#F59E0B}
.badge-danger{background:rgba(239,68,68,.15);color:#EF4444}
.badge-info{background:rgba(6,182,212,.15);color:#06b6d4}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto}
.toast{position:fixed;top:20px;right:20px;z-index:200;padding:14px 24px;border-radius:10px;color:#fff;font-weight:500;font-size:14px;animation:slideIn .3s ease;max-width:380px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(13,148,136,.2)}50%{box-shadow:0 0 40px rgba(13,148,136,.4)}}
.fade-up{animation:fadeUp .5s ease both}
.landing-bg{background:linear-gradient(160deg,#0B1120 0%,#0f2027 30%,#0d3b3b 60%,#0B1120 100%);min-height:100vh;position:relative;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:float 8s ease-in-out infinite}
.pie-container{max-width:300px;margin:0 auto}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}}
.otp-input{width:50px;height:55px;text-align:center;font-size:24px;font-weight:700;background:var(--card);border:2px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:border .3s}

/* ========== LOGO ========== */
function getLogoSVG(s=40){
return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
<defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>

<text x="28" y="40" text-anchor="middle" fill="#fff" font-size="26" font-weight="900" font-family="Outfit,sans-serif">MP</text>
<text x="64" y="28" fill="#14b8a6" font-size="22" font-weight="900" font-family="Outfit,sans-serif">Mauzo</text>
<text x="64" y="52" fill="#22d3ee" font-size="22" font-weight="900" font-family="Outfit,sans-serif">Poa</text>
</svg>`}
function getLogoDataURL(){
const c=document.createElement('canvas');c.width=220;c.height=60;const x=c.getContext('2d');
x.fillStyle='#0B1120';x.fillRect(0,0,220,60);
const g=x.createLinearGradient(2,4,54,56);g.addColorStop(0,'#0d9488');g.addColorStop(1,'#06b6d4');
x.beginPath();x.roundRect(2,4,52,52,14);x.fillStyle=g;x.fill();
x.fillStyle='#fff';x.font='900 26px Outfit,sans-serif';x.textAlign='center';x.fillText('MP',28,40);
x.textAlign='left';x.fillStyle='#14b8a6';x.font='900 22px Outfit,sans-serif';x.fillText('Mauzo',64,28);
x.fillStyle='#22d3ee';x.fillText('Poa',64,52);
return c.toDataURL('image/png')}
function getBusinessLogoURL(){
const u=currentUser();if(!u)return getLogoDataURL();
const biz=db('businesses').find(b=>b.businessId===u.businessId);
if(biz&&biz.logo)return biz.logo;
if(biz&&biz.logoUrl)return biz.logoUrl;
return getLogoDataURL()}

/* ========== DATA LAYER ========== */
function dbGet(col){return JSON.parse(localStorage.getItem('mp_'+col)||'[]')}
function dbSet(col,data){localStorage.setItem('mp_'+col,JSON.stringify(data))}
function db(col){
const u=currentUser();if(!u)return[];
if(u.role==='super_admin')return dbGet(col);
return dbGet(col).filter(i=>i.businessId===u.businessId)}
function dbAll(col){return dbGet(col)}
function dbSave(col,item){
const data=dbGet(col);if(!item.id)item.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const idx=data.findIndex(d=>d.id===item.id);
if(idx>=0)data[idx]={...data[idx],...item};else data.push(item);
dbSet(col,data);addAudit(col+(idx>=0?'_update':'_create'),item.id||item.name);return item}
function dbDel(col,id){
dbSet(col,dbGet(col).filter(d=>d.id!==id));addAudit(col+'_delete',id)}
function addAudit(action,detail){
const u=currentUser();if(!u)return;
const logs=dbGet('audit');logs.push({id:Date.now().toString(36),userId:u.id,userName:u.username||u.email,
action,detail,date:new Date().toISOString(),businessId:u.role==='super_admin'?'system':u.businessId});
dbSet('audit',logs)}

/* ========== NAVIGATION ========== */
let CUR_VIEW='landing',CUR_SUB='dashboard';
function navigate(view,sub){
CUR_VIEW=view;CUR_SUB=sub||'dashboard';
const app=document.getElementById('app');
window.scrollTo(0,0);
switch(view){
case'landing':app.innerHTML=viewLanding();break;
case'login':app.innerHTML=viewLogin();break;
case'register':app.innerHTML=viewRegister();break;
case'forgot':app.innerHTML=viewForgot();break;
case'verify':app.innerHTML=viewVerify();break;
case'sa':app.innerHTML=viewSA(CUR_SUB);break;
case'panel':app.innerHTML=viewPanel(CUR_SUB);break;
default:app.innerHTML=viewLanding()}
if(view==='sa'||view==='panel')initSidebarClicks()}

/* ========== TOAST ========== */
function toast(msg,type='success'){
const d=document.createElement('div');d.className='toast';
d.style.background=type==='success'?'linear-gradient(135deg,#059669,#10B981)':type==='error'?'linear-gradient(135deg,#dc2626,#ef4444)':'linear-gradient(135deg,#d97706,#f59e0b)';
d.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'times-circle':'exclamation-triangle'}"></i> ${msg}`;
document.getElementById('toast-root').appendChild(d);
setTimeout(()=>d.remove(),3500)}

let verifyCode='';
function viewVerify(){
verifyCode=String(Math.floor(100000+Math.random()*900000));
toast(t('code_sent')+': '+verifyCode,'info');
return `<div class="min-h-screen flex items-center justify-center px-4" style="background:linear-gradient(160deg,#0B1120,#0f2027,#0d3b3b)">

 ${[0,1,2,3,4,5].map(i=>`<input type="text" maxlength="1" class="otp-input" data-idx="${i}" oninput="otpInput(this)" onkeydown="otpKey(event,this)">`).join('')}
</div>
<button class="btn-primary w-full" onclick="doVerify()">${t('next')}</button>
<p class="text-sm text-gray-400 mt-4"><a href="#" onclick="verifyCode=String(Math.floor(100000+Math.random()*900000));toast(t('code_sent')+': '+verifyCode,'info');return false" class="text-mp-400 hover:underline">${t('resend')}</a></p>
</div></div>`}

function otpInput(el){
if(el.value.length===1){const n=el.nextElementSibling;if(n)n.focus()}}
function otpKey(e,el){
if(e.key==='Backspace'&&el.value===''){const p=el.previousElementSibling;if(p){p.focus();p.value=''}}}
function doVerify(){
const boxes=document.querySelectorAll('.otp-input');let code='';
boxes.forEach(b=>code+=b.value);
if(code!==verifyCode)return toast(t('code_wrong'),'error');
const u=currentUser();if(u){u.verified=true;
const users=dbGet('users');const idx=users.findIndex(x=>x.id===u.id);
if(idx>=0){users[idx].verified=true;dbSet('users',users)}
setCurrentUser(u);u.role==='super_admin'?navigate('sa','dashboard'):navigate('panel','dashboard')}}

function saBackup(){
return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div class="card text-center"><div class="w-20 h-20 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(239,68,68,.2))">
<i class="fas fa-upload text-3xl text-yellow-400"></i></div>
<h3 class="font-bold text-lg mb-2">${t('restore_backup')}</h3>

<input type="file" id="restore-file" accept=".json" class="hidden" onchange="doRestore(this)">
<button class="btn-secondary" onclick="document.getElementById('restore-file').click()"><i class="fas fa-upload mr-2"></i>${t('restore')}</button></div></div>`}

function doBackup(){
const data={};['users','products','sales','categories','expenses','businesses','messages','audit','modules','employees'].forEach(c=>{data[c]=dbGet(c)});
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='MauzoPoa_Backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
toast(t('backup_success'))}

function doRestore(input){
const file=input.files[0];if(!file)return;
const reader=new FileReader();reader.onload=function(e){
try{const data=JSON.parse(e.target.result);
Object.keys(data).forEach(c=>dbSet(c,data[c]));
toast(t('restore_success'));navigate('sa','backup')}catch(err){toast('Invalid backup file','error')}};
reader.readAsText(file)}

/* SA AI Center */
function saAI(){
const tools=[
['sales_prediction','fa-chart-line','Analyze past sales data to predict future trends'],
['inventory_opt','fa-boxes','Optimize stock levels based on sales velocity'],
['customer_analysis','fa-users','Analyze customer purchasing patterns'],
['price_recommend','fa-tags','Suggest optimal pricing for products'],
['expense_analysis','fa-receipt','Identify spending patterns and savings'],
['trend_detect','fa-chart-area','Detect upward/downward trends in data'],
['stock_alert','fa-bell','Alert on low stock items'],

['best_products','fa-trophy','Rank products by performance'],
['health_score','fa-heartbeat','Overall business health assessment']];
return `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
 ${tools.map(([k,ic,desc])=>`<div class="card cursor-pointer hover:border-mp-500" onclick="runAI('${k}')">
<div class="flex items-center gap-3 mb-2">
<div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,rgba(13,148,136,.2),rgba(6,182,212,.2))">
<i class="fas ${ic} text-mp-400"></i></div>
<h4 class="font-bold">${t(k)}</h4></div>
<p class="text-sm text-gray-400">${desc}</p>
<button class="btn-primary text-xs mt-3">${t('generate')}</button></div>`).join('')}</div>
<div id="ai-result" class="card mt-4" style="display:none"></div>`}

function runAI(tool){
const el=document.getElementById('ai-result');el.style.display='block';
const products=dbAll('products');const sales=dbAll('sales');const expenses=dbAll('expenses');
let html='';const colors=['#0d9488','#06b6d4','#f59e0b','#ef4444','#8b5cf6','#10B981'];
switch(tool){
case'sales_prediction':{
const monthly={};sales.forEach(s=>{const m=s.date?s.date.slice(0,7):'unknown';monthly[m]=(monthly[m]||0)+(s.total||0)});
const labels=Object.keys(monthly).slice(-6);const data=Object.values(monthly).slice(-6);
const avg=data.length?data.reduce((a,b)=>a+b,0)/data.length:0;const pred=Math.round(avg*1.15);
html=`<h3 class="font-bold mb-2">${t('sales_prediction')}</h3><p class="text-gray-400 mb-4">Avg: $${avg.toFixed(0)} | Next month prediction: <span class="text-mp-400 font-bold">$${pred}</span></p>
<div class="pie-container"><canvas id="ai-chart"></canvas></div>`;break}
case'best_products':{
const prodSales={};sales.forEach(s=>(s.items||[]).forEach(i=>{prodSales[i.name]=(prodSales[i.name]||0)+(i.qty||1)}));
const sorted=Object.entries(prodSales).sort((a,b)=>b[1]-a[1]).slice(0,6);
html=`<h3 class="font-bold mb-4">${t('best_products')}</h3><div class="pie-container"><canvas id="ai-chart"></canvas></div>`;
setTimeout(()=>{const c=document.getElementById('ai-chart');if(c)new Chart(c,{type:'pie',data:{labels:sorted.map(s=>s[0]),datasets:[{data:sorted.map(s=>s[1]),backgroundColor:colors}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8'}}}}})},100);break}
case'health_score':{
const sc=Math.min(100,Math.round((products.length*5)+(sales.length*2)+(expenses.length?20:0)+30));
const col=sc>70?'green':sc>40?'yellow':'red';
html=`<h3 class="font-bold mb-4">${t('health_score')}</h3><div class="text-center"><div class="text-6xl font-black text-${col}-400">${sc}</div>
<p class="text-gray-400 mt-2">${sc>70?'Excellent business health':sc>40?'Good, room for improvement':'Needs attention'}</p></div>`;break}
case'stock_alert':{
const low=products.filter(p=>p.quantity<10);
html=`<h3 class="font-bold mb-4">${t('stock_alert')}</h3>${low.length?`<table><tr><th>${t('name')}</th><th>${t('quantity')}</th></tr>
 ${low.map(p=>`<tr><td>${p.name}</td><td class="text-red-400 font-bold">${p.quantity}</td></tr>`).join('')}</table>`
:`<p class="text-green-400">All stock levels are healthy</p>`};break}
case'expense_analysis':{
const cats={};expenses.forEach(e=>{cats[e.category||'Other']=(cats[e.category||'Other']||0)+(e.amount||0)});
html=`<h3 class="font-bold mb-4">${t('expense_analysis')}</h3><div class="pie-container"><canvas id="ai-chart"></canvas></div>`;
setTimeout(()=>{const c=document.getElementById('ai-chart');if(c)new Chart(c,{type:'pie',data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats),backgroundColor:colors}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8'}}}}})},100);break}
default:html=`<h3 class="font-bold mb-2">${t(tool)}</h3><p class="text-gray-400">AI analysis complete. ${products.length} products, ${sales.length} sales, ${expenses.length} expenses analyzed.</p>
<div class="grid grid-cols-3 gap-4 mt-4"><div class="stat-card text-center"><div class="text-2xl font-bold text-mp-400">${products.length}</div><div class="text-xs text-gray-400">${t('products')}</div></div>
<div class="stat-card text-center"><div class="text-2xl font-bold text-cy-400">${sales.length}</div><div class="text-xs text-gray-400">${t('sales')}</div></div>
<div class="stat-card text-center"><div class="text-2xl font-bold text-yellow-400">$${expenses.reduce((a,e)=>a+(e.amount||0),0).toFixed(0)}</div><div class="text-xs text-gray-400">${t('expenses')}</div></div></div>`}
el.innerHTML=`<div class="fade-up">${html}</div>`;
if(tool==='sales_prediction'){const labels2=Object.keys(sales.reduce((m,s)=>{const k=s.date?s.date.slice(0,7):'?';m[k]=1;return m},{})).slice(-6);
const vals=labels2.map(l=>sales.filter(s=>(s.date||'').slice(0,7)===l).reduce((a,s)=>a+(s.total||0),0));
setTimeout(()=>{const c=document.getElementById('ai-chart');if(c)new Chart(c,{type:'pie',data:{labels:labels2.concat(['Predicted']),datasets:[{data:vals.concat([Math.round((vals.reduce((a,b)=>a+b,0)/Math.max(1,vals.length))*1.15)]),backgroundColor:colors.concat(['#22d3ee'])}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8'}}}}})},100)}}

function addToCart(pid){
const p=db('products').find(x=>x.id===pid);if(!p)return;
const existing=cart.find(c=>c.productId===pid);
if(existing){if(existing.qty>=p.quantity)return toast('Max stock','warn');existing.qty++;existing.total=existing.qty*existing.price}
else cart.push({productId:pid,name:p.name,price:p.price,cost:p.cost,qty:1,total:p.price,maxQty:p.quantity});
updateCart()}

function updateCart(){
const el=document.getElementById('cart-items');const sub=cart.reduce((a,c)=>a+c.total,0);
const disc=parseFloat(document.getElementById('cart-disc')?.value||0);
const total=sub*(1-disc/100);
document.getElementById('cart-count').textContent=cart.reduce((a,c)=>a+c.qty,0);
document.getElementById('cart-sub').textContent='$'+sub.toFixed(2);
document.getElementById('cart-total').textContent='$'+total.toFixed(2);
el.innerHTML=cart.length?cart.map((c,i)=>`<div class="flex items-center justify-between p-2 rounded" style="background:var(--card2)">
<div class="flex-1"><div class="text-sm font-medium">${c.name}</div><div class="text-xs text-gray-400">$${c.price.toFixed(2)} x ${c.qty}</div></div>
<div class="flex items-center gap-2">
<button class="w-6 h-6 rounded bg-dk-600 text-xs flex items-center justify-center" onclick="cartQty(${i},-1)">-</button>
<span class="text-sm w-6 text-center">${c.qty}</span>
<button class="w-6 h-6 rounded bg-dk-600 text-xs flex items-center justify-center" onclick="cartQty(${i},1)">+</button>
<span class="text-sm font-bold ml-2">$${c.total.toFixed(2)}</span></div></div>`).join(''):`<p class="text-gray-400 text-sm">${t('no_data')}</p>`}

function cartQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);
else if(cart[i].qty>cart[i].maxQty){cart[i].qty=cart[i].maxQty;toast('Max stock','warn')}
else cart[i].total=cart[i].qty*cart[i].price;updateCart()}

function completeSale(){
if(!cart.length)return toast(t('fill_required'),'error');
const u=currentUser();const sub=cart.reduce((a,c)=>a+c.total,0);
const disc=parseFloat(document.getElementById('cart-disc')?.value||0);
const total=sub*(1-disc/100);const profit=cart.reduce((a,c)=>a+(c.price-c.cost)*c.qty,0);
const sale={customer:document.getElementById('pos-customer').value,
items:cart.map(c=>({productId:c.productId,name:c.name,price:c.price,cost:c.cost,qty:c.qty})),
total,profit,discount:disc,paymentMethod:document.getElementById('pos-pay').value,
date:new Date().toISOString(),businessId:u.businessId,cashier:u.username};
dbSave('sales',sale);
cart.forEach(c=>{const p=db('products').find(x=>x.id===c.productId);
if(p){p.quantity=Math.max(0,p.quantity-c.qty);dbSave('products',p)}});
cart=[];toast(t('sale_complete'));navigate('panel','pos')}

const u=currentUser();const biz=db('businesses').find(b=>b.businessId===u.businessId)||{businessId:u.businessId,name:u.businessName||''};
return `<div class="card mb-4"><h3 class="font-bold mb-4">${t('business_logo')}</h3>
<div class="flex items-center gap-6 mb-4">
<div class="w-24 h-24 rounded-xl border-2 border-dashed border-dk-500 flex items-center justify-center overflow-hidden" id="logo-preview">
 ${biz.logo?`<img src="${biz.logo}" class="w-full h-full object-contain">`:`<i class="fas fa-image text-2xl text-gray-500"></i>`}</div>
<div class="space-y-2"><input type="file" id="logo-file" accept="image/*" class="hidden" onchange="handleLogoUpload(this)">
<button class="btn-primary text-sm" onclick="document.getElementById('logo-file').click()">${t('upload_logo')}</button>
<div><label class="text-xs text-gray-400">${t('logo_url')}</label><input id="logo-url" class="input-field text-sm" value="${biz.logoUrl||''}" placeholder="https://...">
<button class="btn-secondary text-xs mt-1" onclick="saveLogoUrl()">${t('save')}</button></div></div></div></div>
<div class="card"><h3 class="font-bold mb-4">${t('business_name')}</h3>
<div class="space-y-3">
<div><label class="text-sm text-gray-400 mb-1 block">${t('name')}</label>
<input id="biz-name" class="input-field" value="${biz.name||u.businessName||''}"></div>
<div><label class="text-sm text-gray-400 mb-1 block">${t('phone')}</label>
<input id="biz-phone" class="input-field" value="${biz.phone||u.phone||''}"></div>
<div><label class="text-sm text-gray-400 mb-1 block">${t('email')}</label>
<input id="biz-email" class="input-field" value="${biz.email||u.email||''}"></div>
<button class="btn-primary" onclick="saveBiz()">${t('save')}</button></div></div>`}

function handleLogoUpload(input){
const file=input.files[0];if(!file)return;
const reader=new FileReader();reader.onload=function(e){
const u=currentUser();const bizs=db('businesses');let biz=bizs.find(b=>b.businessId===u.businessId);
if(biz){biz.logo=e.target.result}else{biz={businessId:u.businessId,logo:e.target.result};bizs.push(biz)}
dbSet('businesses',bizs);toast(t('item_saved'));navigate('panel','business')};
reader.readAsDataURL(file)}

function saveLogoUrl(){
const url=document.getElementById('logo-url').value.trim();if(!url)return;
const u=currentUser();const bizs=db('businesses');let biz=bizs.find(b=>b.businessId===u.businessId);
if(biz){biz.logoUrl=url}else{biz={businessId:u.businessId,logoUrl:url};bizs.push(biz)}
dbSet('businesses',bizs);toast(t('item_saved'));navigate('panel','business')}

function saveBiz(){
const u=currentUser();const name=document.getElementById('biz-name').value.trim();
const phone=document.getElementById('biz-phone').value.trim();const email=document.getElementById('biz-email').value.trim();
const bizs=db('businesses');let biz=bizs.find(b=>b.businessId===u.businessId);
if(biz){biz.name=name;biz.phone=phone;biz.email=email}else{biz={businessId:u.businessId,name,phone,email};bizs.push(biz)}
dbSet('businesses',bizs);
const users=dbGet('users');const idx=users.findIndex(x=>x.id===u.id);
if(idx>=0){users[idx].businessName=name;users[idx].phone=phone;dbSet('users',users);setCurrentUser(users[idx])}
toast(t('item_saved'));navigate('panel','business')}

/* Panel License */
function panelLicense(){
const u=currentUser();const daysLeft=u.licenseExpiry?Math.max(0,Math.ceil((new Date(u.licenseExpiry)-new Date())/86400000)):0;
const pct=Math.min(100,(daysLeft/365)*100);
return `<div class="card text-center max-w-lg mx-auto">
<div class="w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center" style="background:linear-gradient(135deg,${daysLeft>30?'rgba(13,148,136,.2),rgba(6,182,212,.2)':'rgba(239,68,68,.2),rgba(245,158,11,.2)'})">
<i class="fas fa-key text-4xl ${daysLeft>30?'text-mp-400':'text-red-400'}"></i></div>
<h2 class="text-2xl font-bold mb-2">${t('license_info')}</h2>
<p class="text-gray-400 mb-6">${u.businessName||'-'}</p>
<div class="mb-6"><div class="text-5xl font-black ${daysLeft>30?'text-mp-400':daysLeft>7?'text-yellow-400':'text-red-400'}">${daysLeft}</div>
<p class="text-sm text-gray-400 mt-1">${t('days_left')}</p></div>
<div class="w-full h-3 rounded-full mb-6" style="background:var(--card2)">
<div class="h-3 rounded-full transition-all" style="width:${pct}%;background:linear-gradient(90deg,#0d9488,#06b6d4)"></div></div>
 ${u.licenseExpiry?`<p class="text-sm text-gray-400">${t('date')}: ${new Date(u.licenseExpiry).toLocaleDateString()}</p>`:''}
<div class="mt-6 p-4 rounded-lg" style="background:var(--card2)">
<p class="text-sm text-gray-400">${t('contact_support')}</p>
<p class="text-mp-400 font-bold mt-1"><a href="tel:0714864117">0714864117</a></p></div></div>`}

/* ========== EXPORT FUNCTIONS ========== */
function exportExcel(filename,rows){
try{
const ws=XLSX.utils.json_to_sheet(rows);
const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Data');
/* Add logo info as first row */
const logoUrl=getBusinessLogoURL();
XLSX.utils.sheet_add_aoa(ws,[[{v:'Mauzo Poa',t:'s'},{v:`${t('powered_by')} - ${new Date().toLocaleDateString()}`,t:'s'}]],{origin:'A'+(rows.length+3)});
XLSX.writeFile(wb,filename+'.xlsx');toast(t('backup_success'))}catch(e){toast('Excel error: '+e.message,'error')}}

function exportPDF(title,headers,rows,filename){
try{
const{jsPDF}=window.jspdf;const doc=new jsPDF('l','mm','a4');
const logoUrl=getBusinessLogoURL();
/* Logo */
try{doc.addImage(logoUrl,'PNG',14,10,50,14)}catch(e){}
/* Title */
doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(13,148,136);
doc.text(title,70,18);
doc.setFontSize(9);doc.setTextColor(100);doc.text(t('powered_by')+' | '+new Date().toLocaleDateString(),70,24);
doc.setDrawColor(13,148,136);doc.setLineWidth(0.5);doc.line(14,28,283,28);
/* Table */
let y=34;const colW=269/headers.length;
doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setFillColor(23,35,64);doc.rect(14,y,269,8,'F');doc.setTextColor(150);
headers.forEach((h,i)=>doc.text(h.substring(0,25),16+i*colW,y+5.5));
y+=10;doc.setFont('helvetica','normal');doc.setTextColor(50);
rows.forEach((row,ri)=>{if(y>185){doc.addPage();y=20}
if(ri%2===0){doc.setFillColor(245,247,250);doc.rect(14,y,269,7,'F')}
row.forEach((cell,ci)=>{const txt=String(cell||'').substring(0,30);doc.text(txt,16+ci*colW,y+5)});
y+=7});
/* Footer */
doc.setFontSize(7);doc.setTextColor(150);
doc.text('Mauzo Poa - '+t('powered_by'),14,195);
doc.save(filename+'.pdf');toast(t('backup_success'))}catch(e){toast('PDF error: '+e.message,'error')}}

/* ========== UTILITY ========== */
function filterTable(tableId,q){
q=q.toLowerCase();const table=document.getElementById(tableId);if(!table)return;
table.querySelectorAll('tr[data-search]').forEach(r=>{r.style.display=r.dataset.search.includes(q)?'':'none'})}

/* ========== CHART INIT OBSERVER ========== */
function initCharts(){
setTimeout(()=>{
if(document.getElementById('sa-chart-roles'))saReportsCharts();
if(document.getElementById('rpt-profit'))panelReportsCharts()},200)}

/* Watch for view changes to init charts */
const origNavigate=navigate;
navigate=function(view,sub){
origNavigate(view,sub);
if(view==='sa'&&sub==='reports')initCharts();
if(view==='sa'&&sub==='ai'){}
if(view==='panel'&&sub==='reports')initCharts()};

/* ========== INIT ========== */
initApp();
const session=currentUser();
if(session&&session.verified){
session.role==='super_admin'?navigate('sa','dashboard'):navigate('panel','dashboard')}
else if(session&&!session.verified){navigate('verify')}
else{navigate('landing')}
</script>
