<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Database - Sign Up</title>
    <style>
        /* --- General Layout --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- Main Container (The Card) --- */
        .signup-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .header h2 { margin: 0; color: #2c3e50; }
        .header p { color: #777; font-size: 0.9rem; }

        /* --- CSS Grid Configuration --- */
        .user-form-grid {
            display: grid;
            /* Creates 2 equal columns. Change to '1fr' if you want one single column */
            grid-template-columns: 1fr 1fr; 
            gap: 20px 30px; /* Row gap | Column gap */
        }

        /* --- Form Elements Styling --- */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* Make specific fields span the full width (2 columns) */
        .full-width {
            grid-column: 1 / -1; /* Spans from column 1 to the last column */
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        /* --- Password Container Styling --- */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 40px; /* Space for the eye icon */
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            cursor: pointer;
            color: #777;
            font-size: 1.1rem;
            user-select: none;
        }

        /* --- Submit Button --- */
        .submit-btn {
            grid-column: 1 / -1; /* Full width button */
            padding: 15px;
            background-color: #27ae60; /* Green for Sign Up */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #219150;
        }

        /* --- Responsive Design --- */
        @media (max-width: 600px) {
            .user-form-grid {
                grid-template-columns: 1fr; /* Stack columns on mobile */
            }
            .full-width, .submit-btn {
                grid-column: 1; /* Reset span for mobile */
            }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="header">
        <h2>Create User Profile</h2>
        <p>Fill in the details below to register in the database</p>
    </div>

    <form class="user-form-grid" action="#" method="POST">
        
        <!-- Row 1: First Name & Last Name -->
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="John" required>
        </div>
        
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
        </div>

        <!-- Row 2: Email (Full Width) -->
        <div class="form-group full-width">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
        </div>

        <!-- Row 3: Phone & Role -->
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+255 7XX XXX XXX">
        </div>

        <div class="form-group">
            <label for="role">User Role</label>
            <select id="role" name="role">
                <option value="user">Standard User</option>
                <option value="admin">Administrator</option>
                <option value="editor">Editor</option>
            </select>
        </div>

        <!-- Row 4: Password -->
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Min 8 characters" required>
                <span class="toggle-password" onclick="togglePass('password', this)">👁️</span>
            </div>
        </div>

        <!-- Row 5: Confirm Password -->
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="Retype password" required>
                <span class="toggle-password" onclick="togglePass('confirmPassword', this)">👁️</span>
            </div>
        </div>

        <!-- Row 6: Submit Button -->
        <button type="submit" class="submit-btn">Register User</button>

    </form>
</div>

<script>
    // Simple JavaScript to toggle password visibility
    function togglePass(inputId, icon) {
        var input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "🙈"; // Change icon to 'hide' symbol
        } else {
            input.type = "password";
            icon.textContent = "👁️"; // Change back to 'eye'
        }
    }
</script>

</body>
</html>
