<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majadiliano - Together Safe Network</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

.header {
    background:#002147;
    color:white;
    padding:15px;
    text-align:center;
}

.container {
    width:90%;
    margin:auto;
    padding:20px;
}

.form-box {
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.form-box input, .form-box textarea {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.form-box button {
    background:#28a745;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    cursor:pointer;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.media img, .media video {
    width:100%;
    max-height:300px;
    margin-top:10px;
    border-radius:8px;
}

.btn-delete {
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    float:right;
}

</style>
</head>

<body>

<div class="header">
    <h2>MAJADILIANO YA JAMII</h2>
</div>

<div class="container">

<!-- POST FORM -->
<div class="form-box">
    <h3>Andika Posti</h3>

    <input type="text" id="username" placeholder="Jina lako">

    <textarea id="content" placeholder="Andika ujumbe wako..."></textarea>

    <input type="file" id="fileInput" multiple>

    <button onclick="addPost()">Tuma Posti</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

</div>

<script>

/* STORAGE */
function getPosts(){
    return JSON.parse(localStorage.getItem("posts") || "[]");
}

function savePosts(data){
    localStorage.setItem("posts", JSON.stringify(data));
}

/* ADD POST */
function addPost(){

    let username = document.getElementById("username").value;
    let content = document.getElementById("content").value;
    let files = document.getElementById("fileInput").files;

    if(content == ""){
        alert("Write something!");
        return;
    }

    let post = {
        id: Date.now(),
        username: username || "Anonymous",
        content: content,
        files: [],
        date: new Date().toLocaleString()
    };

    let promises = [];

    for(let file of files){
        let reader = new FileReader();

        let promise = new Promise((resolve)=>{
            reader.onload = function(e){
                post.files.push({
                    name: file.name,
                    type: file.type,
                    data: e.target.result
                });
                resolve();
            }
            reader.readAsDataURL(file);
        });

        promises.push(promise);
    }

    Promise.all(promises).then(()=>{
        let posts = getPosts();
        posts.push(post);
        savePosts(posts);

        alert("Post Added");

        document.getElementById("content").value="";
        document.getElementById("fileInput").value="";

        loadPosts();
    });
}

/* LOAD POSTS */
function loadPosts(){

    let container = document.getElementById("posts");
    container.innerHTML="";

    let posts = getPosts().reverse();

    posts.forEach(p => {

        let mediaHTML = "";

        p.files.forEach(f => {

            if(f.type.startsWith("image")){
                mediaHTML += `<img src="${f.data}">`;
            }
            else if(f.type.startsWith("video")){
                mediaHTML += `<video controls src="${f.data}"></video>`;
            }
            else {
                mediaHTML += `
                    <p>
                        📄 <a href="${f.data}" download="${f.name}">
                        ${f.name}
                        </a>
                    </p>
                `;
            }

        });

        container.innerHTML += `
            <div class="card">
                <button class="btn-delete" onclick="deletePost(${p.id})">Delete</button>
                <h4>${p.username}</h4>
                <small>${p.date}</small>
                <p>${p.content}</p>

                <div class="media">${mediaHTML}</div>
            </div>
        `;
    });
}

/* DELETE (ADMIN CONTROL) */
function deletePost(id){

    let adminPassword = prompt("Enter Admin Password:");

    if(adminPassword !== "ADMIN123"){
        alert("Access Denied");
        return;
    }

    let posts = getPosts().filter(p => p.id !== id);

    savePosts(posts);
    loadPosts();
}

/* INIT */
loadPosts();

</script>

</body>
</html>
