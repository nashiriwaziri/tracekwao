<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f6f9;
}

.header{
    background:#001f3f;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    flex:1;
    min-width:200px;
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.section{
    margin-top:30px;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.delete{background:red;color:white;}
.update{background:blue;color:white;}

</style>
</head>

<body>

<div class="header">
    <h2>ADMIN DASHBOARD</h2>
</div>

<div class="container">

<!-- STATS -->
<div class="stats">
    <div class="box">
        <h3 id="totalProfiles">0</h3>
        <p>Profiles</p>
    </div>
    <div class="box">
        <h3 id="totalPosts">0</h3>
        <p>Majadiliano</p>
    </div>
    <div class="box">
        <h3 id="totalHelp">0</h3>
        <p>Help Requests</p>
    </div>
</div>

<!-- PROFILES -->
<div class="section">
    <h3>Manage Profiles</h3>
    <div id="profiles"></div>
</div>

<!-- POSTS -->
<div class="section">
    <h3>Manage Majadiliano</h3>
    <div id="posts"></div>
</div>

<!-- HELP -->
<div class="section">
    <h3>Manage Help Requests</h3>
    <div id="help"></div>
</div>

</div>

<script>

/* AUTH */
let pass = prompt("Enter Admin Password:");

if (pass !== "WAZIRI2015") {
    alert("Access Denied");
    document.body.innerHTML = "";
} else {
    console.log("Access Granted");
}

}

/* STORAGE FUNCTIONS */
function getData(key){
    return JSON.parse(localStorage.getItem(key) || "[]");
}
function saveData(key,data){
    localStorage.setItem(key, JSON.stringify(data));
}

/* LOAD STATS */
function loadStats(){
    document.getElementById("totalProfiles").innerText = getData("profiles").length;
    document.getElementById("totalPosts").innerText = getData("posts").length;
    document.getElementById("totalHelp").innerText = getData("helpRequests").length;
}

/* LOAD PROFILES */
function loadProfiles(){
    let data = getData("profiles");
    let container = document.getElementById("profiles");
    container.innerHTML="";

    data.forEach(p=>{
        container.innerHTML += `
        <div class="card">
            <b>${p.name}</b> (${p.role})
            <button class="delete" onclick="deleteItem('profiles',${p.id})">Delete</button>
        </div>`;
    });
}

/* LOAD POSTS */
function loadPosts(){
    let data = getData("posts");
    let container = document.getElementById("posts");
    container.innerHTML="";

    data.forEach(p=>{
        container.innerHTML += `
        <div class="card">
            <b>${p.username}</b>
            <p>${p.content}</p>
            <button class="delete" onclick="deleteItem('posts',${p.id})">Delete</button>
        </div>`;
    });
}

/* LOAD HELP */
function loadHelp(){
    let data = getData("helpRequests");
    let container = document.getElementById("help");
    container.innerHTML="";

    data.forEach(r=>{
        container.innerHTML += `
        <div class="card">
            <b>${r.name}</b> - ${r.category}
            <p>${r.description}</p>

            <button class="update" onclick="updateStatus(${r.id},'In Progress')">Start</button>
            <button class="update" onclick="updateStatus(${r.id},'Resolved')">Resolve</button>
            <button class="delete" onclick="deleteItem('helpRequests',${r.id})">Delete</button>
        </div>`;
    });
}

/* DELETE */
function deleteItem(key,id){
    let data = getData(key).filter(i=>i.id!==id);
    saveData(key,data);
    reloadAll();
}

/* UPDATE STATUS */
function updateStatus(id,status){
    let data = getData("helpRequests");

    data.forEach(r=>{
        if(r.id==id){
            r.status=status;
        }
    });

    saveData("helpRequests",data);
    reloadAll();
}

/* RELOAD */
function reloadAll(){
    loadStats();
    loadProfiles();
    loadPosts();
    loadHelp();
}

reloadAll();

</script>

</body>
</html>
