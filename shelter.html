<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Donation - Support Vulnerable People</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .donation-container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .donation-amounts { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .amount-btn { flex: 1; padding: 10px; margin: 0 5px; border: 1px solid #3498db; background: #fff; color: #3498db; cursor: pointer; border-radius: 4px; text-align: center; }
        .amount-btn:hover, .amount-btn.active { background: #3498db; color: #fff; }
        .donate-btn { width: 100%; padding: 15px; background: #27ae60; border: none; color: #fff; font-size: 18px; border-radius: 4px; cursor: pointer; }
        .donate-btn:hover { background: #219150; }
        .privacy-note { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="donation-container">
    <h2>❤️ Donate for Medical Aid</h2>
    <p style="text-align:center;">Help us provide essential medical supplies to the most vulnerable individuals.</p>
    
    <form action="/submit-donation" method="POST">
        <div class="form-group">
            <label>Amount (USD)</label>
            <div class="donation-amounts">
                <button type="button" class="amount-btn">$25</button>
                <button type="button" class="amount-btn active">$50</button>
                <button type="button" class="amount-btn">$100</button>
                <input type="number" name="custom-amount" placeholder="Other" style="width: 30%;">
            </div>
        </div>
        
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Donation Type</label>
            <select name="type">
                <option value="once">One-time</option>
                <option value="monthly">Monthly</option>
            </select>
        </div>
        
        <button type="submit" class="donate-btn">Donate Now</button>
    </form>
    
    <div class="privacy-note">
        Your donation is secure and encrypted. We respect your privacy.
    </div>
</div>

</body>
</html>
