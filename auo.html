const FB_CONFIG = {
  apiKey: "AIzaSyBxxxxxxxxxxxxxxxxxxxxxxxxxxx",

  projectId: "your-project-id",

/* ═══════ FIRESTORE STORE ═══════ */
const FS = {
  db: null,
  ready: false,
  useFallback: false,

  async init() {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
      this.db = firebase.firestore();
      // Test connection
      await this.db.collection('_ping').doc('conn').set({ t: Date.now() });
      this.ready = true;
      console.log('Firestore connected');
    } catch (e) {
      console.warn('Firestore unavailable, using localStorage fallback:', e.message);
      this.useFallback = true;
      this.ready = true;
    }
  },

  _ls(k) { try { return JSON.parse(localStorage.getItem('auo_' + k)) || []; } catch { return []; } },
  _lss(k, v) { localStorage.setItem('auo_' + k, JSON.stringify(v)); },

  async get(col) {
    if (this.useFallback) return this._ls(col);
    try {
      const snap = await this.db.collection(col).get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) { console.error('GET error:', col, e); return []; }
  },

  async add(col, data) {
    const now = new Date().toISOString();
    data.createdAt = now;
    if (this.useFallback) {
      const d = this._ls(col);
      data.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      d.push(data); this._lss(col, d);
      return data;
    }
    try {
      const ref = await this.db.collection(col).add(data);
      return { id: ref.id, ...data };
    } catch (e) { console.error('ADD error:', col, e); return null; }
  },

  async update(col, id, updates) {
    updates.updatedAt = new Date().toISOString();
    if (this.useFallback) {
      const d = this._ls(col);
      const i = d.findIndex(x => x.id === id);
      if (i > -1) { Object.assign(d[i], updates); this._lss(col, d); return d[i]; }
      return null;
    }
    try {
      await this.db.collection(col).doc(id).update(updates);
      return { id, ...updates };
    } catch (e) { console.error('UPDATE error:', col, id, e); return null; }
  },

  async remove(col, id) {
    if (this.useFallback) {
      this._lss(col, this._ls(col).filter(x => x.id !== id)); return;
    }
    try { await this.db.collection(col).doc(id).delete(); } catch (e) { console.error('REMOVE error:', col, id, e); }
  },

  async find(col, id) {
    if (this.useFallback) return this._ls(col).find(x => x.id === id) || null;
    try {
      const doc = await this.db.collection(col).doc(id).get();
      return doc.exists ? { id: doc.id, ...doc.data() } : null;
    } catch (e) { return null; }
  },

  async count(col, filter) {
    const d = await this.get(col);
    return filter ? d.filter(filter).length : d.length;
  }
};

function toast(m, tp='info') {
  const c = document.getElementById('tc'), d = document.createElement('div');
  d.className = `toast t-${tp[0]}`;
  const ic = {success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
  d.innerHTML = `<i class="fas ${ic[tp]||ic.info}"></i><span>${m}</span>`;
  c.appendChild(d);
  setTimeout(() => { d.style.animation = 'fo .3s forwards'; setTimeout(() => d.remove(), 300); }, 3200);
}

function ptcls() {
  let h = '';
  for (let i = 0; i < 15; i++) {
    const l = Math.random()*100, tp = Math.random()*100, d = Math.random()*6+4, dl = Math.random()*5;
    h += `<div class="ptc" style="left:${l}%;top:${tp}%;animation-duration:${d}s;animation-delay:${dl}s;width:${Math.random()*3+1.5}px;height:${Math.random()*3+1.5}px;opacity:${Math.random()*.25+.08}"></div>`;
  }
  return h;
}

      ${fields.map(f=>`<td class="p-3 text-xs">${d[f.n]||'-'}</td>`).join('')}

        <input id="wf-${f.n.replace(/\s/g,'_')}" type="${f.t}" class="inp" value="${ed?.[f.n]||''}" placeholder="${f.n}"></div>`;

/* ═══════ EVENT BINDING ═══════ */
function bindEvents() {
  const $ = id => document.getElementById(id);
  const app = document.getElementById('app');

  // Landing
  $('bl')?.addEventListener('click', async () => {
    const e = $('le').value.trim(), p = $('lp').value;
    if(!e||!p){toast(t('fillRequired'),'error');return}
    const users = await FS.get('users');
    const u = users.find(x=>x.email===e&&x.password===p);
    if(!u){toast(t('wrongCreds'),'error');return}
    S.user = u; nav('user-dash');
  });
  $('bsu')?.addEventListener('click', ()=>nav('signup',{ss:0}));
  $('ba')?.addEventListener('click', ()=>nav('admin-login'));

  // Signup cats
  app.querySelectorAll('[data-cat]').forEach(el=>el.addEventListener('click',()=>nav('signup',{ss:1,selCat:el.dataset.cat})));
  $('bbl')?.addEventListener('click',()=>nav('landing'));
  $('bbc')?.addEventListener('click',()=>nav('signup',{ss:0}));

  // Signup subs
  app.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',()=>nav('signup',{ss:2,selSub:el.dataset.sub})));
  $('bbs')?.addEventListener('click',()=>nav('signup',{ss:1}));

  // Signup form

    setTimeout(()=>{
      $('msm')?.addEventListener('click',async()=>{

        await FS.add('custom_modules',{name:n,subs:$('ms2').value.split(',').map(s=>s.trim()).filter(Boolean),color:$('mc2').value.trim()||'#00d4ff',icon:'fa-cube'});

        audit('Role Added',n);closeModal();toast(t('roleAdded'),'success');render();
      });

  });

  app.querySelectorAll('[data-drl]').forEach(el=>el.addEventListener('click',async()=>{await FS.remove('roles',el.dataset.drl);toast(t('roleDeleted'),'info');render()}));

  // Add subscription
  $('bas')?.addEventListener('click', async () => {
    const users = (await FS.get('users')).filter(u=>u.status==='active');
    const opts = users.length===0 ? `<option>${t('noActiveUsers')}</option>` : users.map(u=>`<option value="${u.id}" data-n="${u.name}">${u.name} (${u.subModule})</option>`).join('');

      <div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t('name')}</label><select id="su2" class="inp">${opts}</select></div>
      <div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t('plan')}</label><select id="spl" class="inp"><option>${t('basic')}</option><option>${t('standard')}</option><option>${t('premium')}</option><option>${t('enterprise')}</option></select></div>
      <div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t('expiry')}</label><input id="sex" type="date" class="inp"></div>
      <button id="mss" class="btn-p w-full">${t('save')}</button></div>`);
    setTimeout(()=>{
      $('mss')?.addEventListener('click',async()=>{
        const sel=$('su2'),un=sel?.selectedOptions[0]?.dataset?.n||'';
        await FS.add('subscriptions',{userId:sel?.value,userName:un,plan:$('spl').value,expiry:$('sex').value,status:'active'});
        audit('Subscription Added',un);closeModal();toast(t('subAdded'),'success');render();
      });
    },50);
  });

  app.querySelectorAll('[data-dsub]').forEach(el=>el.addEventListener('click',async()=>{await FS.remove('subscriptions',el.dataset.dsub);toast(t('subDeleted'),'info');render()}));

  // Add payment
  $('bap')?.addEventListener('click', async () => {
    const users = await FS.get('users');
    showModal(t('addPayment'),`<div class="space-y-3">
      <div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t('name')}</label><select id="pu" class="inp">${users.map(u=>`<option value="${u.id}" data-n="${u.name}">${u.name}</option>`).join('')}</select></div>
      <div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t('amount')} (TZS)</label><input id="pa" type="number" class="inp"></div>
      <div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t('method')}</label><select id="pm" class="inp"><option>${t('cash')}</option><option>${t('mobileMoney')}</option><option>${t('bankTransfer')}</option><option>${t('card')}</option></select></div>
      <button id="mps" class="btn-p w-full">${t('save')}</button></div>`);
    setTimeout(()=>{
      $('mps')?.addEventListener('click',async()=>{

        audit('Payment Added','');closeModal();toast(t('payAdded'),'success');render();
      });

  });

  // Messages
  app.querySelectorAll('[data-rmsg]').forEach(el=>el.addEventListener('click',async()=>{await FS.update('messages',el.dataset.rmsg,{read:true});render()}));
  app.querySelectorAll('[data-dmsg]').forEach(el=>el.addEventListener('click',async()=>{await FS.remove('messages',el.dataset.dmsg);toast(t('msgNotResponded'),'info');render()}));

  // Backup
  $('bbk')?.addEventListener('click', async () => {
    const data={};
    for(const c of ['users','messages','audit','payments','subscriptions','roles','custom_modules','api_keys']){data[c]=await FS.get(c)}
    (await FS.get('users')).forEach(async u=>{data[u.id+'_data']=await FS.get(u.id+'_data')});
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`auo_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
    audit('Backup','');toast(t('backupDownloaded'),'success');
  });

  $('brs')?.addEventListener('click',()=>$('rf')?.click());
  $('rf')?.addEventListener('change',(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async(ev)=>{
      try{const d=JSON.parse(ev.target.result);for(const[k,v] of Object.entries(d)){await new Promise(res=>{FS._lss(k,v);res()})}audit('Restore','');toast(t('dataRestored'),'success');render()}
      catch{toast(t('error'),'error')}
    };r.readAsText(f);
  });

  // Load db stats for backup page
  if(S.view==='admin'&&S.atab==='backup'){
    (async()=>{
      const el=document.getElementById('db-stats');
      if(!el)return;
      const cols=['users','messages','audit','payments','subscriptions','roles','custom_modules','api_keys'];
      el.innerHTML=cols.map(async c=>`<div class="p-3 rounded-lg text-center" style="background:var(--card2)"><p class="text-lg font-bold" style="color:var(--accent)">${(await FS.get(c)).length}</p><p class="text-xs" style="color:var(--muted)">${c}</p></div>`).join('');
      el.innerHTML = (await Promise.all(cols.map(async c=>{
        const cnt = (await FS.get(c)).length;
        return `<div class="p-3 rounded-lg text-center" style="background:var(--card2)"><p class="text-lg font-bold" style="color:var(--accent)">${cnt}</p><p class="text-xs" style="color:var(--muted)">${c}</p></div>`;
      }))).join('');
    })();
  }

  // Audit clear
  $('bca')?.addEventListener('click',async()=>{const logs=await FS.get('audit');for(const l of logs)await FS.remove('audit',l.id);toast(t('logsCleared'),'info');render()});

  // API key
  $('bgk')?.addEventListener('click',async()=>{

    await FS.add('api_keys',{key,usage:0});audit('API Key Generated','');toast(t('keyGenerated'),'success');render();
  });
  app.querySelectorAll('[data-rk]').forEach(el=>el.addEventListener('click',async()=>{await FS.remove('api_keys',el.dataset.rk);audit('API Key Revoked','');toast(t('keyRevoked'),'info');render()}));

  // AI tools

  // Settings

/* ═══════ MODAL ═══════ */
function showModal(title,content){
  closeModal();
  const m=document.createElement('div');m.id='mo';m.className='mo';
  m.innerHTML=`<div class="mc-box"><h3 class="font-semibold mb-4">${title}</h3>${content}</div>`;
  document.body.appendChild(m);m.addEventListener('click',e=>{if(e.target===m)closeModal()});
}
function closeModal(){document.getElementById('mo')?.remove()}

/* ═══════ AI TOOLS ═══════ */
function renderAITool(id){
  const out=document.getElementById('aio');if(!out)return;
  out.style.display='block';out.scrollIntoView({behavior:'smooth'});
  const dateNow=new Date().toLocaleDateString(lang==='sw'?'sw-KE':'en-US',{day:'numeric',month:'long',year:'numeric'});

  if(id==='chatbot'){
    out.innerHTML=`<div class="flex items-center justify-between mb-4"><h3 class="font-semibold" style="color:var(--accent)"><i class="fas fa-robot mr-2"></i>${t('chatbot')}</h3>
      <button onclick="document.getElementById('aio').style.display='none'" class="text-xs" style="color:var(--muted)"><i class="fas fa-times"></i></button></div>
      <div class="flex flex-col" style="height:380px"><div class="flex-1 overflow-y-auto p-3 space-y-3" id="cm">
      <div class="flex gap-2"><div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0" style="background:var(--accent);color:#fff;font-size:10px;font-weight:bold">AI</div>
      <div class="glass rounded-xl rounded-tl-none p-3 text-sm max-w-xs" style="color:var(--muted)">${t('greeting')} ${t('aiGreet')}</div></div></div>
      <div class="flex gap-2 mt-3"><input id="ci" class="inp flex-1" placeholder="${t('typeMsg')}" onkeydown="if(event.key==='Enter')document.getElementById('cs')?.click()">
      <button id="cs" class="btn-p px-4"><i class="fas fa-paper-plane"></i></button></div></div>`;
    setTimeout(()=>{
      const resp={};
      resp[lang==='sw'?'habari':'hello']=[lang==='sw'?'Habari zako! Niko tayari kukusaidia.':'Hello! I am ready to help you.'],
        [lang==='sw'?'moduli':'modules']:[lang==='sw'?'AUO SYSTEMS ina moduli zaidi ya 18 na sub-modules zaidi ya 70.':'AUO SYSTEMS has over 18 modules and 70+ sub-modules.'],
        [lang==='sw'?'leseni':'license']:[lang==='sw'?'Wasiliana na Super Administrator kupata leseni.':'Contact Super Administrator to get a license.']};
      const defResp=[lang==='sw'?'Samahani, sijaelewa. Uliza tena.':'Sorry, I did not understand. Ask again.'];
      $('cs')?.addEventListener('click',()=>{
        const msg=$('ci')?.value.trim();if(!msg)return;
        const cm=document.getElementById('cm');
        cm.innerHTML+=`<div class="flex gap-2 justify-end"><div class="rounded-xl rounded-tr-none p-3 text-sm max-w-xs" style="background:var(--accent);color:#fff">${msg}</div></div>`;
        $('ci').value='';cm.scrollTop=cm.scrollHeight;
        setTimeout(()=>{
          let r=defResp[Math.floor(Math.random()*defResp.length)];
          for(const[k,v] of Object.entries(resp)){if(msg.toLowerCase().includes(k)){r=v[Math.floor(Math.random()*v.length)];break}}
          cm.innerHTML+=`<div class="flex gap-2"><div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0" style="background:var(--accent);color:#fff;font-size:10px;font-weight:bold">AI</div>
          <div class="glass rounded-xl rounded-tl-none p-3 text-sm max-w-xs" style="color:var(--muted)">${r}</div></div>`;
          cm.scrollTop=cm.scrollHeight;
        },600);
      });
    },50);
    return;
  }

  if(id==='voice'){
    out.innerHTML=`<div class="flex items-center justify-between mb-4"><h3 class="font-semibold" style="color:var(--accent)"><i class="fas fa-microphone mr-2"></i>${t('voice')}</h3>
      <button onclick="document.getElementById('aio').style.display='none'" class="text-xs" style="color:var(--muted)"><i class="fas fa-times"></i></button></div>
      <div class="text-center"><div id="vs" class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center transition-all" style="background:var(--card2);border:3px solid var(--border)">
      <i class="fas fa-microphone text-3xl" style="color:var(--muted)" id="vi"></i></div>
      <p class="text-sm mb-4" style="color:var(--muted)" id="vt">${t('clickBelow')}</p>
      <button id="vb" class="btn-p px-8 py-3"><i class="fas fa-microphone"></i>${t('startSpeaking')}</button>
      <div id="vr" class="mt-4 text-sm" style="display:none"></div></div>`;
    setTimeout(()=>{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){$('vt').textContent=t('voiceNotSupported');return}
      const rec=new SR();rec.lang=lang==='sw'?'sw-TZ':'en-US';let lis=false;
      $('vb')?.addEventListener('click',()=>{if(lis){rec.stop();return}rec.start();lis=true;
        $('vs').style.borderColor='var(--danger)';$('vi').style.color='var(--danger)';$('vt').textContent=t('listening')});
      rec.onresult=e=>{const tx=e.results[0][0].transcript;$('vr').style.display='block';
        $('vr').innerHTML=`<div class="glass rounded-xl p-4"><p class="text-xs mb-1" style="color:var(--muted)">${t('youSaid')}</p><p class="text-sm font-medium">${tx}</p>
        <p class="text-xs mt-2" style="color:var(--accent)">${t('aiResponse')} ${lang==='sw'?'Nimefurahi kusikia.':'I heard you.'}</p></div>`;
        if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(lang==='sw'?'Nimefurahi kusikia.':'I heard you.');u.lang=lang==='sw'?'sw-TZ':'en-US';speechSynthesis.speak(u)}};
      rec.onend=()=>{lis=false;$('vs').style.borderColor='var(--border)';$('vi').style.color='var(--muted)';$('vt').textContent=t('clickBelow')};
      rec.onerror=()=>{lis=false;$('vt').textContent=t('error')};
    },50);
    return;
  }

  // Generic AI tool forms
  const toolDefs={
    report:[{k:'reportTitle',t:'text'},{k:'reportType',t:'select',o:['Machapisho','Uchambuzi','Maendeleo','Fedha','Reports','Analysis','Progress','Finance']},{k:'reportContent',t:'textarea'}],
    letter:[{k:'recipient',t:'text'},{k:'sender',t:'text'},{k:'topic',t:'text'},{k:'body',t:'textarea'}],
    contract:[{k:'party1',t:'text'},{k:'party2',t:'text'},{k:'contractSubject',t:'text'},{k:'terms',t:'textarea'}],
    invoice:[{k:'client',t:'text'},{k:'items',t:'textarea'},{k:'tax',t:'number'}],
    dashboard:[{k:'dashName',t:'text'},{k:'metrics',t:'textarea'}],
    predict:[{k:'historicalData',t:'textarea'},{k:'forecastPeriods',t:'number'}],
    financial:[{k:'revenue',t:'number'},{k:'expenses',t:'number'},{k:'assets_val',t:'number'},{k:'liabilities',t:'number'}],
    medical:[{k:'symptoms',t:'text'},{k:'age',t:'number'},{k:'gender',t:'select',o:[t('male'),t('female')]}]
  };
  const fields=toolDefs[id]||[];
  out.innerHTML=`<div class="flex items-center justify-between mb-4"><h3 class="font-semibold" style="color:var(--accent)"><i class="fas fa-robot mr-2"></i>${t(id==='report'?'reportWriter':id==='letter'?'letterGen':id==='contract'?'contractGen':id==='invoice'?'invoiceGen':id==='dashboard'?'dashBuilder':id==='predict'?'predictive':id==='financial'?'financial':'medical')}</h3>
    <button onclick="document.getElementById('aio').style.display='none'" class="text-xs" style="color:var(--muted)"><i class="fas fa-times"></i></button></div>
    <div class="space-y-3" id="aif">${fields.map(f=>{
      if(f.t==='select') return `<div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t(f.k)}</label>
        <select id="ai-${f.k}" class="inp">${(f.o||[]).map(o=>`<option>${o}</option>`).join('')}</select></div>`;
      if(f.t==='textarea') return `<div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t(f.k)}</label>
        <textarea id="ai-${f.k}" class="inp" rows="4"></textarea></div>`;
      return `<div><label class="text-xs font-medium mb-1 block" style="color:var(--muted)">${t(f.k)}</label>
        <input id="ai-${f.k}" type="${f.t}" class="inp"></div>`;
    }).join('')}
    <button id="aig" class="btn-p w-full py-3"><i class="fas fa-magic"></i>${t('generate')}</button></div>
    <div id="air" class="mt-4" style="display:none"></div>`;

  setTimeout(()=>{
    $('aig')?.addEventListener('click',()=>{
      const v={};fields.forEach(f=>{const el=$(`ai-${f.k}`);v[f.k]=el?el.value:''});
      let html='';
      if(id==='report') html=genReport(v,dateNow);
      else if(id==='letter') html=genLetter(v,dateNow);
      else if(id==='contract') html=genContract(v,dateNow);
      else if(id==='invoice') html=genInvoice(v);
      else if(id==='dashboard') html=genDash(v);
      else if(id==='predict') html=genPredict(v);
      else if(id==='financial') html=genFinancial(v);
      else if(id==='medical') html=genMedical(v);
      $('air').innerHTML=html;$('air').style.display='block';audit('AI Generated',id);
    });
  },50);
}

      <div><p class="text-sm font-semibold mb-6">${v.party1||'-'}</p><p class="text-xs" style="color:var(--muted)">${t('signature')} _________</p></div>
      <div><p class="text-sm font-semibold mb-6">${v.party2||'-'}</p><p class="text-xs" style="color:var(--muted)">${t('signature')} _________</p></div></div></div>`;

function genInvoice(v){
  const invN='INV-'+Date.now().toString(36).toUpperCase();
  const lines=(v.items||'').split('\n').filter(Boolean);
  let sub=0;const rows=lines.map(l=>{const p=l.split(',');const nm=p[0]||'-',q=parseFloat(p[1])||0,pr=parseFloat(p[2])||0;const tot=q*pr;sub+=tot;
    return `<tr class="border-t" style="border-color:var(--border)"><td class="p-2 text-xs">${nm}</td><td class="p-2 text-xs text-right">${q}</td><td class="p-2 text-xs text-right">${pr.toLocaleString()}</td><td class="p-2 text-xs text-right font-semibold">${tot.toLocaleString()}</td></tr>`}).join('');
  const tx=parseFloat(v.tax)||0,txA=sub*tx/100,gr=sub+txA;
  return `<div class="glass rounded-xl p-5" style="border-left:3px solid var(--accent)">
    <div class="flex justify-between items-start mb-5"><div><h2 class="text-lg font-bold">${t('invoiceNo')} ${invN}</h2></div>
    <div class="text-right"><p class="text-xs" style="color:var(--muted)">${d||''}</p><p class="text-xs" style="color:var(--muted)">${t('client')}: ${v.client||'-'}</p></div></div>
    <table class="w-full text-sm mb-4"><thead><tr style="background:var(--card2)"><th class="text-left p-2 text-xs" style="color:var(--muted)">${t('item')}</th><th class="text-right p-2 text-xs" style="color:var(--muted)">${t('qty')}</th><th class="text-right p-2 text-xs" style="color:var(--muted)">${t('price')}</th><th class="text-right p-2 text-xs" style="color:var(--muted)">${t('total')}</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="4" class="p-4 text-center text-xs" style="color:var(--muted)">${t('noData')}</td></tr>`}</tbody></table>
    <div class="text-right space-y-1"><p class="text-sm">${t('subtotal')}: <strong>TZS ${sub.toLocaleString()}</strong></p>
    ${tx>0?`<p class="text-sm" style="color:var(--muted)">${t('tax')} (${tx}%): TZS ${txA.toLocaleString()}</p>`:''}
    <p class="text-lg font-bold" style="color:var(--accent)">${t('grandTotal')}: TZS ${gr.toLocaleString()}</p></div></div>`;
}
function genDash(v){
  const ms=(v.metrics||'').split('\n').filter(Boolean).map(l=>{const p=l.split(',');return{n:p[0]||'-',v:parseFloat(p[1])||0}});
  const cols=['var(--accent)','var(--success)','var(--warn)','var(--danger)','#fd79a8','#a29bfe'];
  return `<div class="glass rounded-xl p-5"><h3 class="font-semibold mb-4">${v.dashName||'Dashboard'}</h3>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${ms.map((m,i)=>`<div class="sc glass" style="border-left:3px solid ${cols[i%cols.length]}"><p class="text-xs" style="color:var(--muted)">${m.n}</p><p class="text-2xl font-bold" style="color:${cols[i%cols.length]}">${m.v.toLocaleString()}</p></div>`).join('')}</div></div>`;
}
function genPredict(v){
  const lines=(v.historicalData||'').split('\n').filter(Boolean);
  const vals=lines.map(l=>parseFloat(l.split(',')[1])||0);const per=parseInt(v.forecastPeriods)||3;
  if(vals.length<2) return `<p class="text-sm" style="color:var(--muted)">${t('noData')}</p>`;
  const n=vals.length;let sX=0,sY=0,sXY=0,sXX=0;
  vals.forEach((y,x)=>{sX+=x;sY+=y;sXY+=x*y;sXX+=x*x});
  const slope=(n*sXY-sX*sY)/(n*sXX-sX*sX)||0,intercept=(sY-slope*sX)/n;
  const preds=[];for(let i=0;i<per;i++)preds.push(Math.round(slope*(n+i)+intercept));
  return `<div class="glass rounded-xl p-5"><h3 class="font-semibold mb-4" style="color:var(--accent)">${t('prediction')}</h3>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
    <div class="p-4 rounded-lg" style="background:var(--card2)"><p class="text-xs mb-2" style="color:var(--muted)">${t('history')}</p>
    ${vals.map((v,i)=>`<div class="flex justify-between py-1 text-xs"><span style="color:var(--muted)">${t('period')} ${i+1}</span><span>${v.toLocaleString()}</span></div>`).join('')}</div>
    <div class="p-4 rounded-lg" style="background:var(--card2)"><p class="text-xs mb-2" style="color:var(--accent)">${t('prediction')}</p>
    ${preds.map((v,i)=>`<div class="flex justify-between py-1 text-xs"><span style="color:var(--muted)">${t('period')} ${n+i+1}</span><span class="font-semibold" style="color:var(--accent)">${v.toLocaleString()}</span></div>`).join('')}</div></div>
  <p class="text-xs" style="color:var(--muted)">${t('predNote')} Slope: ${slope.toFixed(2)}</p></div>`;
}
function genFinancial(v){
  const rev=parseFloat(v.revenue)||0,exp=parseFloat(v.expenses)||0,ast=parseFloat(v.assets_val)||0,lia=parseFloat(v.liabilities)||0;
  const pft=rev-exp,eq=ast-lia,mg=rev>0?(pft/rev*100).toFixed(1):0,roe=eq>0?(pft/eq*100).toFixed(1):0,cr=lia>0?(ast/lia).toFixed(2):'N/A',dr=ast>0?(lia/ast*100).toFixed(1):0;
  return `<div class="glass rounded-xl p-5"><h3 class="font-semibold mb-4" style="color:var(--accent)">${t('financial')}</h3>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
    <div class="p-3 rounded-lg text-center" style="background:var(--card2)"><p class="text-xs" style="color:var(--muted)">${t('revenue')}</p><p class="text-lg font-bold" style="color:var(--success)">TZS ${rev.toLocaleString()}</p></div>
    <div class="p-3 rounded-lg text-center" style="background:var(--card2)"><p class="text-xs" style="color:var(--muted)">${t('expenses')}</p><p class="text-lg font-bold" style="color:var(--danger)">TZS ${exp.toLocaleString()}</p></div>
    <div class="p-3 rounded-lg text-center" style="background:var(--card2)"><p class="text-xs" style="color:var(--muted)">${t('profitMargin')}</p><p class="text-lg font-bold" style="color:${pft>=0?'var(--success)':'var(--danger)'}">TZS ${pft.toLocaleString()}</p></div>
    <div class="p-3 rounded-lg text-center" style="background:var(--card2)"><p class="text-xs" style="color:var(--muted)">Equity</p><p class="text-lg font-bold" style="color:var(--accent)">TZS ${eq.toLocaleString()}</p></div></div>
  <div class="space-y-2 text-sm">
    <div class="flex justify-between p-2 rounded" style="background:var(--card2)"><span style="color:var(--muted)">${t('profitMargin')}</span><span class="font-semibold">${mg}%</span></div>
    <div class="flex justify-between p-2 rounded" style="background:var(--card2)"><span style="color:var(--muted)">${t('returnOnEquity')}</span><span class="font-semibold">${roe}%</span></div>
    <div class="flex justify-between p-2 rounded" style="background:var(--card2)"><span style="color:var(--muted)">${t('currentRatio')}</span><span class="font-semibold">${cr}</span></div>
    <div class="flex justify-between p-2 rounded" style="background:var(--card2)"><span style="color:var(--muted)">${t('debtRatio')}</span><span class="font-semibold">${dr}%</span></div></div></div>`;
}
function genMedical(v){
  const syms=(v.symptoms||'').split(',').map(s=>s.trim().toLowerCase());
  const conds={'homa':['Malaria','Viral Infection','COVID-19'],'kuumwa kichwa':['Migraine','Hypertension','Tension Headache'],
    'kutapika':['Cholera','Food Poisoning','Gastroenteritis'],'kohoa':['Pneumonia','TB','Bronchitis'],
    'fever':['Malaria','Flu','COVID-19','Typhoid'],'headache':['Migraine','Hypertension','Tension'],
    'vomiting':['Cholera','Food Poisoning','Gastroenteritis'],'cough':['Pneumonia','TB','Bronchitis','Asthma']};
  let res=[];syms.forEach(s=>{if(conds[s])res.push({s,c:conds[s],sv:'medium'});else{for(const[k,v] of Object.entries(conds)){if(k.includes(s)||s.includes(k)){res.push({s,c:v,sv:'medium'});break}}}});
  if(res.length===0)res.push({s:'General',c:['Further analysis required'],sv:'medium'});
  const sc={low:'var(--success)',medium:'var(--warn)',high:'var(--danger')};
  return `<div class="glass rounded-xl p-5" style="border-left:3px solid var(--danger)">
    <div class="flex items-center gap-2 mb-4"><i class="fas fa-exclamation-triangle" style="color:var(--warn)"></i>
    <h3 class="font-semibold" style="color:var(--warn)">${t('medicalDisclaimer')}</h3></div>
    <p class="text-xs mb-4 p-2 rounded" style="background:rgba(255,71,87,.08);color:var(--danger)">${t('medWarn')}</p>
    <div class="space-y-3">${res.map(r=>`<div class="p-3 rounded-lg" style="background:var(--card2)">
      <div class="flex items-center justify-between mb-2"><span class="text-sm font-medium">${r.s}</span>
      <span class="text-xs px-2 py-0.5 rounded" style="background:${sc[r.lv]}18;color:${sc[r.lv]}">${t(r.lv)}</span></div>
      <p class="text-xs" style="color:var(--muted)">${t('possibleConditions')}: ${r.c.join(', ')}</p></div>`).join('')}</div>
    <p class="text-xs mt-4" style="color:var(--muted)">${t('age')}: ${v.age||'-'} | ${t('gender')}: ${v.gender||'-'}</p></div>`;
}

async function initCharts(){

  if(chm){const mc={};users.forEach(u=>{mc[u.subModule]=(mc[u.subModule]||0)+1});
    S.charts.m=new Chart(chm,{type:'bar',data:{labels:Object.keys(mc).slice(0,8),datasets:[{label:'Users',data:Object.values(mc).slice(0,8),backgroundColor:'rgba(0,212,255,.25)',borderColor:'#00d4ff',borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#556a8a',font:{size:9}},grid:{color:'rgba(22,32,64,.5)'}},y:{ticks:{color:'#556a8a',font:{size:9}},grid:{color:'rgba(22,32,64,.5)'}}}}});}
  const chs=document.getElementById('chs');
  if(chs){S.charts.s=new Chart(chs,{type:'doughnut',data:{labels:[t('pending'),t('approved'),t('rejected')],
    datasets:[{data:[users.filter(u=>u.status==='pending').length,users.filter(u=>u.status==='active').length,users.filter(u=>u.status==='rejected').length],
    backgroundColor:['rgba(255,177,66,.4)','rgba(46,213,115,.4)','rgba(255,71,87,.4)'],borderColor:['#ffb142','#2ed573','#ff4757'],borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#556a8a',font:{size:10}}}}}});}
  const crs=document.getElementById('crs');
  if(crs){S.charts.rs=new Chart(crs,{type:'pie',data:{labels:[t('pending'),t('approved'),t('rejected')],
    datasets:[{data:[users.filter(u=>u.status==='pending').length,users.filter(u=>u.status==='active').length,users.filter(u=>u.status==='rejected').length],
    backgroundColor:['rgba(255,177,66,.35)','rgba(46,213,115,.35)','rgba(255,71,87,.35)'],borderWidth:0}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#556a8a',font:{size:10}}}}}});}
  const crm=document.getElementById('crm');

    S.charts.rm=new Chart(crm,{type:'polarArea',data:{labels:Object.keys(cc),datasets:[{data:Object.values(cc),backgroundColor:cols.map(c=>c+'35'),borderColor:cols,borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#556a8a',font:{size:9}}}},scales:{r:{ticks:{display:false},grid:{color:'rgba(22,32,64,.5)'}}}}});}
}
