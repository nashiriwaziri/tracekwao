<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buru la Msaada</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.header{
    background:#b30000;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    width:90%;
    margin:auto;
    padding:20px;
}

.form-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.form-box input, textarea, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-submit{
    background:#28a745;
    color:white;
    width:100%;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.status{
    padding:5px 10px;
    border-radius:5px;
    color:white;
    display:inline-block;
}

.pending{background:orange;}
.progress{background:blue;}
.resolved{background:green;}

.admin-btn{
    background:red;
    color:white;
    float:right;
}

</style>
</head>

<body>

<div class="header">
    <h2>BURU LA MSAADA (HELP DESK)</h2>
</div>

<div class="container">

<!-- FORM -->
<div class="form-box">
    <h3>Omba Msaada</h3>

    <input type="text" id="name" placeholder="Jina lako">

    <input type="text" id="phone" placeholder="Namba ya simu">

    <select id="category">
        <option>Emergency</option>
        <option>Legal Help</option>
        <option>Child Protection</option>
        <option>Counselling</option>
    </select>

    <textarea id="description" placeholder="Eleza tatizo lako kwa kina"></textarea>

    <input type="file" id="imageInput">

    <button class="btn-submit" onclick="submitHelp()">Tuma Ombi</button>
</div>

<!-- LIST -->
<div id="helpList"></div>

</div>

<script>

/* STORAGE */
function getHelp(){
    return JSON.parse(localStorage.getItem("helpRequests") || "[]");
}

function saveHelp(data){
    localStorage.setItem("helpRequests", JSON.stringify(data));
}

/* SUBMIT */
function submitHelp(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let category = document.getElementById("category").value;
    let description = document.getElementById("description").value;
    let file = document.getElementById("imageInput").files[0];

    if(description == ""){
        alert("Please describe your issue");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        let request = {
            id: Date.now(),
            name,
            phone,
            category,
            description,
            image: file ? e.target.result : "",
            status: "Pending",
            date: new Date().toLocaleString()
        };

        let data = getHelp();
        data.push(request);

        saveHelp(data);
        loadHelp();

        alert("Msaada wako umetumwa");

        document.getElementById("description").value="";
        document.getElementById("imageInput").value="";
    }

    if(file){
        reader.readAsDataURL(file);
    }else{
        reader.onload({target:{result:""}});
    }
}

/* DISPLAY */
function loadHelp(){

    let container = document.getElementById("helpList");
    container.innerHTML="";

    let data = getHelp().reverse();

    data.forEach(r => {

        let statusClass = r.status == "Pending" ? "pending" :
                          r.status == "In Progress" ? "progress" :
                          "resolved";

        container.innerHTML += `
        <div class="card">
            <button class="admin-btn" onclick="deleteRequest(${r.id})">Delete</button>

            <h4>${r.name || "Anonymous"}</h4>
            <small>${r.date}</small>

            <p><b>Category:</b> ${r.category}</p>
            <p>${r.description}</p>

            ${r.image ? `<img src="${r.image}" style="width:100%;margin-top:10px;">` : ""}

            <p class="status ${statusClass}">${r.status}</p>

            <br>

            <button onclick="updateStatus(${r.id}, 'In Progress')">Start</button>
            <button onclick="updateStatus(${r.id}, 'Resolved')">Resolve</button>
        </div>
        `;
    });
}

/* UPDATE STATUS */
function updateStatus(id, newStatus){

    let data = getHelp();

    data.forEach(r=>{
        if(r.id == id){
            r.status = newStatus;
        }
    });

    saveHelp(data);
    loadHelp();
}

/* DELETE (ADMIN) */
function deleteRequest(id){

    let pass = prompt("Admin Password:");

    if(pass !== "ADMIN123"){
        alert("Access Denied");
        return;
    }

    let data = getHelp().filter(r => r.id !== id);

    saveHelp(data);
    loadHelp();
}

loadHelp();

</script>

</body>
</html>
