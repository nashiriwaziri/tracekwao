<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bei za Kiotomatiki</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f3ef;color:#1c1917;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.08)}
h1{font-size:1.6rem;font-weight:800;margin-bottom:4px}
.sub{font-size:.85rem;color:#78716c;margin-bottom:28px;line-height:1.5}
label{display:block;font-size:.78rem;font-weight:600;color:#78716c;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
input{width:100%;padding:12px 14px;border:1.5px solid #e7e5e4;border-radius:10px;font-size:15px;transition:border .2s,box-shadow .2s;background:#fff;color:#1c1917;font-family:inherit}
input:focus{outline:none;border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,0.1)}
.field{margin-bottom:18px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.result{background:linear-gradient(135deg,#d97706,#b45309);color:#fff;border-radius:14px;padding:24px;text-align:center;margin-top:24px}
.result p{font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:4px}
.result span{font-size:2rem;font-weight:800}
.result .hint{font-size:.7rem;opacity:.6;margin-top:8px;font-weight:400}
</style>
</head>
<body>
<div class="card">
  <h1>Bei za Kiotomatiki</h1>
  <p class="sub">Bei ya kuuza ihesabiwe kwa kuzingatia: Bei ya Gharama, Gharama za Uendeshaji, na Asilimia ya Faida.</p>

  <div class="field">
    <label>Bei ya Gharama (TZS)</label>
    <input type="number" id="cost" oninput="calc()" placeholder="25000">
  </div>

  <div class="row">
    <div class="field">
      <label>Gharama za Uendeshaji (%)</label>
      <input type="number" id="overhead" value="10" oninput="calc()" placeholder="10">
    </div>
    <div class="field">
      <label>Asilimia ya Faida (%)</label>
      <input type="number" id="margin" value="20" oninput="calc()" placeholder="20">
    </div>
  </div>

  <div class="result">
    <p>Bei Iliyohesabiwa</p>
    <span id="price">0</span>
    <div class="hint">TZS</div>
  </div>
</div>

<script>
function calc(){
  const c=parseFloat(document.getElementById('cost').value)||0;
  const o=parseFloat(document.getElementById('overhead').value)||0;
  const m=parseFloat(document.getElementById('margin').value)||0;
  const p=Math.round(c*(1+o/100+m/100));
  document.getElementById('price').textContent=p.toLocaleString('en-TZ');
}
calc();
</script>
</body>
</html>
